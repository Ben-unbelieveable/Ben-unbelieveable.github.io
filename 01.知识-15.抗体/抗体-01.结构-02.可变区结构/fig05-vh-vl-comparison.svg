<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 480" font-family="Segoe UI, 'Microsoft YaHei', sans-serif">
  <rect width="720" height="480" fill="#fafafa"/>
  <text x="360" y="26" text-anchor="middle" font-size="15" fill="#1a202c" font-weight="600">图 5　VH 与 VL 结构差异对照（同一尺度侧视示意）</text>
  <text x="360" y="44" text-anchor="middle" font-size="10" fill="#718096">基于典型人源 Fab 几何；β 折叠域主体 + CDR 环；虚线框示近似尺寸</text>
  <g transform="translate(80, 70)">
    <text x="120" y="0" text-anchor="middle" font-size="13" fill="#2b6cb0" font-weight="600">VH（重链可变域）</text>
    <rect x="30" y="20" width="180" height="200" fill="none" stroke="#bee3f8" stroke-width="1.5" stroke-dasharray="5 4" rx="6"/>
    <text x="120" y="38" text-anchor="middle" font-size="8" fill="#718096">~55 × 45 Å 量级</text>
    <rect x="70" y="55" width="28" height="130" fill="#63b3ed" fill-opacity="0.5" stroke="#2b6cb0" stroke-width="1.5" rx="2"/>
    <rect x="102" y="62" width="24" height="116" fill="#2b6cb0" fill-opacity="0.35" stroke="#2b6cb0" stroke-width="1.5" rx="2"/>
    <text x="98" y="125" text-anchor="middle" font-size="9" fill="#1a365d">β 片</text>
    <path d="M 70 55 Q 45 40 30 55 Q 18 68 15 85" fill="none" stroke="#dd6b20" stroke-width="3.5" stroke-linecap="round"/>
    <text x="8" y="50" font-size="8" fill="#c05621">H1</text>
    <path d="M 126 62 Q 155 55 175 72" fill="none" stroke="#dd6b20" stroke-width="3" stroke-linecap="round"/>
    <text x="178" y="68" font-size="8" fill="#c05621">H2</text>
    <path d="M 70 185 Q 50 215 45 250 Q 42 275 55 295" fill="none" stroke="#9b2c2c" stroke-width="5.5" stroke-linecap="round"/>
    <text x="28" y="240" font-size="9" fill="#9b2c2c" font-weight="600">H3</text>
    <text x="28" y="254" font-size="7" fill="#9b2c2c">最长、最突出</text>
    <path d="M 98 185 L 98 210" stroke="#2b6cb0" stroke-width="2"/>
    <text x="98" y="225" text-anchor="middle" font-size="9" fill="#2b6cb0">C 端 → CH1</text>
    <text x="120" y="250" text-anchor="middle" font-size="9" fill="#4a5568">• 由 V–D–J 重排组装</text>
    <text x="120" y="266" text-anchor="middle" font-size="9" fill="#4a5568">• FR 略长，界面 Trp 保守</text>
    <text x="120" y="282" text-anchor="middle" font-size="9" fill="#4a5568">• H3 多样性主导识别</text>
  </g>
  <g transform="translate(400, 70)">
    <text x="120" y="0" text-anchor="middle" font-size="13" fill="#276749" font-weight="600">VL（轻链可变域）</text>
    <rect x="40" y="20" width="160" height="190" fill="none" stroke="#c6f6d5" stroke-width="1.5" stroke-dasharray="5 4" rx="6"/>
    <text x="120" y="38" text-anchor="middle" font-size="8" fill="#718096">~50 × 42 Å 量级</text>
    <rect x="78" y="55" width="26" height="120" fill="#9ae6b4" fill-opacity="0.5" stroke="#276749" stroke-width="1.5" rx="2"/>
    <rect x="108" y="62" width="22" height="106" fill="#276749" fill-opacity="0.35" stroke="#276749" stroke-width="1.5" rx="2"/>
    <text x="103" y="120" text-anchor="middle" font-size="9" fill="#22543d">β 片</text>
    <path d="M 78 55 Q 55 35 35 50 Q 22 65 18 82" fill="none" stroke="#dd6b20" stroke-width="4" stroke-linecap="round"/>
    <text x="8" y="42" font-size="8" fill="#c05621">L1</text>
    <text x="8" y="54" font-size="7" fill="#975a16">κ/λ 差异</text>
    <path d="M 130 62 Q 155 58 168 72" fill="none" stroke="#dd6b20" stroke-width="2" stroke-linecap="round"/>
    <text x="172" y="68" font-size="8" fill="#c05621">L2</text>
    <text x="172" y="80" font-size="7" fill="#975a16">最短</text>
    <path d="M 78 175 Q 62 200 58 228 Q 55 248 68 265" fill="none" stroke="#dd6b20" stroke-width="3.5" stroke-linecap="round"/>
    <text x="42" y="220" font-size="8" fill="#c05621">L3</text>
    <path d="M 103 175 L 103 200" stroke="#276749" stroke-width="2"/>
    <text x="103" y="215" text-anchor="middle" font-size="9" fill="#276749">C 端 → CL</text>
    <text x="120" y="250" text-anchor="middle" font-size="9" fill="#4a5568">• 由 V–J 重排组装</text>
    <text x="120" y="266" text-anchor="middle" font-size="9" fill="#4a5568">• κ 与 λ 两型，同抗体内一致</text>
    <text x="120" y="282" text-anchor="middle" font-size="9" fill="#4a5568">• L1 可较长；L2 几乎固定</text>
  </g>
  <path d="M 310 200 L 390 200" stroke="#c53030" stroke-width="2" stroke-dasharray="6 4"/>
  <text x="350" y="190" text-anchor="middle" font-size="10" fill="#c53030" font-weight="600">配对</text>
  <text x="350" y="218" text-anchor="middle" font-size="8" fill="#c53030">界面</text>
  <rect x="40" y="360" width="640" height="108" fill="#fff" stroke="#e2e8f0" rx="5"/>
  <text x="55" y="382" font-size="11" fill="#1a202c" font-weight="600">结构差异速查</text>
  <line x1="260" y1="390" x2="260" y2="458" stroke="#e2e8f0"/>
  <line x1="480" y1="390" x2="480" y2="458" stroke="#e2e8f0"/>
  <text x="150" y="402" text-anchor="middle" font-size="9" fill="#718096" font-weight="600">特征</text>
  <text x="370" y="402" text-anchor="middle" font-size="9" fill="#2b6cb0" font-weight="600">VH</text>
  <text x="590" y="402" text-anchor="middle" font-size="9" fill="#276749" font-weight="600">VL</text>
  <text x="55" y="422" font-size="9" fill="#4a5568">基因组装</text>
  <text x="370" y="422" text-anchor="middle" font-size="9" fill="#4a5568">V–D–J</text>
  <text x="590" y="422" text-anchor="middle" font-size="9" fill="#4a5568">V–J</text>
  <text x="55" y="440" font-size="9" fill="#4a5568">最长 CDR</text>
  <text x="370" y="440" text-anchor="middle" font-size="9" fill="#9b2c2c">H3（3–25+ aa）</text>
  <text x="590" y="440" text-anchor="middle" font-size="9" fill="#4a5568">L1（可达 17 aa）</text>
  <text x="55" y="458" font-size="9" fill="#4a5568">下游恒定域</text>
  <text x="370" y="458" text-anchor="middle" font-size="9" fill="#4a5568">CH1</text>
  <text x="590" y="458" text-anchor="middle" font-size="9" fill="#4a5568">CL（κ / λ）</text>
</svg>