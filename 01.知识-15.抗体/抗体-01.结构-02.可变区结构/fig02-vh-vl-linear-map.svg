<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 340" font-family="Segoe UI, 'Microsoft YaHei', sans-serif">
  <defs>
    <linearGradient id="fr" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e2e8f0"/><stop offset="100%" stop-color="#a0aec0"/>
    </linearGradient>
    <linearGradient id="cdr" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fbd38d"/><stop offset="100%" stop-color="#dd6b20"/>
    </linearGradient>
    <linearGradient id="vhbar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#63b3ed"/><stop offset="100%" stop-color="#2b6cb0"/>
    </linearGradient>
    <linearGradient id="vlbar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#9ae6b4"/><stop offset="100%" stop-color="#276749"/>
    </linearGradient>
  </defs>
  <rect width="800" height="340" fill="#fafafa"/>
  <text x="400" y="26" text-anchor="middle" font-size="15" fill="#1a202c" font-weight="600">图 2　VH 与 VL 的线性分区：FR / CDR 排列与长度差异（IMGT 边界示意）</text>
  <text x="400" y="44" text-anchor="middle" font-size="10" fill="#718096">灰色 FR 维持折叠；橙色 CDR 高变；具体边界以所用编号方案为准</text>
  <text x="40" y="88" font-size="12" fill="#2b6cb0" font-weight="600">VH（重链可变域）</text>
  <text x="40" y="104" font-size="9" fill="#718096">约 110–120 aa；N 端 → C 端</text>
  <rect x="40" y="112" width="720" height="36" fill="#ebf8ff" stroke="#bee3f8" rx="4"/>
  <rect x="42" y="114" width="95" height="32" fill="url(#fr)" stroke="#718096" rx="3"/><text x="89" y="134" text-anchor="middle" font-size="10" fill="#1a202c">FR1</text>
  <rect x="139" y="114" width="52" height="32" fill="url(#cdr)" stroke="#c05621" rx="3"/><text x="165" y="134" text-anchor="middle" font-size="9" fill="#fff" font-weight="600">H1</text>
  <rect x="193" y="114" width="88" height="32" fill="url(#fr)" stroke="#718096" rx="3"/><text x="237" y="134" text-anchor="middle" font-size="10" fill="#1a202c">FR2</text>
  <rect x="283" y="114" width="68" height="32" fill="url(#cdr)" stroke="#c05621" rx="3"/><text x="317" y="134" text-anchor="middle" font-size="9" fill="#fff" font-weight="600">H2</text>
  <rect x="353" y="114" width="105" height="32" fill="url(#fr)" stroke="#718096" rx="3"/><text x="405" y="134" text-anchor="middle" font-size="10" fill="#1a202c">FR3</text>
  <rect x="460" y="114" width="118" height="32" fill="#c05621" stroke="#9b2c2c" rx="3"/>
  <text x="519" y="130" text-anchor="middle" font-size="9" fill="#fff" font-weight="600">H3</text>
  <text x="519" y="142" text-anchor="middle" font-size="7" fill="#fed7d7">最长、最多样</text>
  <rect x="580" y="114" width="88" height="32" fill="url(#fr)" stroke="#718096" rx="3"/><text x="624" y="134" text-anchor="middle" font-size="10" fill="#1a202c">FR4</text>
  <rect x="670" y="114" width="88" height="32" fill="url(#vhbar)" fill-opacity="0.35" stroke="#2b6cb0" stroke-dasharray="4 3" rx="3"/><text x="714" y="134" text-anchor="middle" font-size="9" fill="#2b6cb0">→ CH1</text>
  <text x="40" y="188" font-size="12" fill="#276749" font-weight="600">VL（轻链可变域）</text>
  <text x="40" y="204" font-size="9" fill="#718096">约 105–115 aa；N 端 → C 端</text>
  <rect x="40" y="212" width="720" height="36" fill="#f0fff4" stroke="#c6f6d5" rx="4"/>
  <rect x="42" y="214" width="92" height="32" fill="url(#fr)" stroke="#718096" rx="3"/><text x="88" y="234" text-anchor="middle" font-size="10" fill="#1a202c">FR1</text>
  <rect x="136" y="214" width="72" height="32" fill="url(#cdr)" stroke="#c05621" rx="3"/><text x="172" y="234" text-anchor="middle" font-size="9" fill="#fff" font-weight="600">L1</text>
  <rect x="210" y="214" width="86" height="32" fill="url(#fr)" stroke="#718096" rx="3"/><text x="253" y="234" text-anchor="middle" font-size="10" fill="#1a202c">FR2</text>
  <rect x="298" y="214" width="38" height="32" fill="url(#cdr)" stroke="#c05621" rx="3"/><text x="317" y="234" text-anchor="middle" font-size="9" fill="#fff" font-weight="600">L2</text>
  <rect x="338" y="214" width="102" height="32" fill="url(#fr)" stroke="#718096" rx="3"/><text x="389" y="234" text-anchor="middle" font-size="10" fill="#1a202c">FR3</text>
  <rect x="442" y="214" width="62" height="32" fill="url(#cdr)" stroke="#c05621" rx="3"/><text x="473" y="234" text-anchor="middle" font-size="9" fill="#fff" font-weight="600">L3</text>
  <rect x="506" y="214" width="86" height="32" fill="url(#fr)" stroke="#718096" rx="3"/><text x="549" y="234" text-anchor="middle" font-size="10" fill="#1a202c">FR4</text>
  <rect x="594" y="214" width="88" height="32" fill="url(#vlbar)" fill-opacity="0.35" stroke="#276749" stroke-dasharray="4 3" rx="3"/><text x="638" y="234" text-anchor="middle" font-size="9" fill="#276749">→ CL</text>
  <rect x="40" y="268" width="720" height="58" fill="#fff" stroke="#e2e8f0" rx="4"/>
  <text x="55" y="288" font-size="10" fill="#1a202c" font-weight="600">主要差异（结构层面）</text>
  <text x="55" y="308" font-size="10" fill="#4a5568">• CDR-H3 长度与构象空间远大于 L3；常占 paratope 接触面积过半</text>
  <text x="55" y="324" font-size="10" fill="#4a5568">• CDR-L2 通常最短；κ/λ 轻链的 L1 边界与典型长度略有不同</text>
  <text x="420" y="308" font-size="10" fill="#4a5568">• VH FR 略长，界面残基保守性模式不同（见图 3）</text>
  <text x="420" y="324" font-size="10" fill="#4a5568">• 二者 C 端 FR4 后分别连接 CH1 / CL</text>
</svg>