<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 400" font-family="Segoe UI, 'Microsoft YaHei', sans-serif">
  <defs>
    <linearGradient id="dom" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e2e8f0"/><stop offset="100%" stop-color="#a0aec0"/>
    </linearGradient>
  </defs>
  <rect width="760" height="400" fill="#fafafa"/>
  <text x="380" y="26" text-anchor="middle" font-size="15" fill="#1a202c" font-weight="600">图 4　六条 CDR 环在 Fv 上的空间排布与典型长度对比</text>
  <text x="380" y="44" text-anchor="middle" font-size="10" fill="#718096">环区用曲线示拓扑；棒长示相对长度量级（非精确比例）；基于 Fab 结构统计</text>
  <ellipse cx="380" cy="195" rx="130" ry="90" fill="url(#dom)" fill-opacity="0.35" stroke="#718096" stroke-width="2"/>
  <text x="380" y="192" text-anchor="middle" font-size="12" fill="#1a202c" font-weight="600">Fv</text>
  <text x="380" y="208" text-anchor="middle" font-size="9" fill="#4a5568">VH（蓝侧）+ VL（绿侧）</text>
  <rect x="195" y="168" width="52" height="22" fill="#bee3f8" stroke="#2b6cb0" rx="3"/>
  <text x="221" y="183" text-anchor="middle" font-size="10" fill="#2b6cb0" font-weight="600">VH</text>
  <rect x="513" y="168" width="52" height="22" fill="#c6f6d5" stroke="#276749" rx="3"/>
  <text x="539" y="183" text-anchor="middle" font-size="10" fill="#276749" font-weight="600">VL</text>
  <path d="M 280 145 Q 310 115 340 105 Q 360 98 375 95" fill="none" stroke="#2b6cb0" stroke-width="4" stroke-linecap="round"/>
  <text x="378" y="88" font-size="9" fill="#2b6cb0" font-weight="600">H1</text>
  <text x="378" y="100" font-size="7" fill="#4a5568">5–7 aa</text>
  <path d="M 480 145 Q 450 112 420 100 Q 400 92 385 88" fill="none" stroke="#276749" stroke-width="4.5" stroke-linecap="round"/>
  <text x="368" y="78" font-size="9" fill="#276749" font-weight="600">L1</text>
  <text x="368" y="90" font-size="7" fill="#4a5568">10–17 aa</text>
  <path d="M 265 175 Q 295 155 325 148" fill="none" stroke="#2b6cb0" stroke-width="3.5" stroke-linecap="round"/>
  <text x="248" y="152" font-size="9" fill="#2b6cb0" font-weight="600">H2</text>
  <text x="248" y="164" font-size="7" fill="#4a5568">16–19 aa</text>
  <path d="M 495 175 Q 465 168 445 162" fill="none" stroke="#276749" stroke-width="2.5" stroke-linecap="round"/>
  <text x="512" y="158" font-size="9" fill="#276749" font-weight="600">L2</text>
  <text x="512" y="170" font-size="7" fill="#4a5568">7 aa</text>
  <path d="M 270 235 Q 290 275 310 305 Q 330 330 350 345" fill="none" stroke="#9b2c2c" stroke-width="6" stroke-linecap="round"/>
  <text x="248" y="310" font-size="10" fill="#9b2c2c" font-weight="600">H3</text>
  <text x="248" y="324" font-size="8" fill="#9b2c2c">3–25+ aa</text>
  <path d="M 490 235 Q 470 265 450 288 Q 430 308 410 322" fill="none" stroke="#276749" stroke-width="4" stroke-linecap="round"/>
  <text x="512" y="295" font-size="9" fill="#276749" font-weight="600">L3</text>
  <text x="512" y="309" font-size="7" fill="#4a5568">8–11 aa</text>
  <ellipse cx="380" cy="195" rx="22" ry="55" fill="#feb2b2" fill-opacity="0.25" stroke="#e53e3e" stroke-width="1.5"/>
  <text x="380" y="258" text-anchor="middle" font-size="9" fill="#742a2a">表位</text>
  <rect x="40" y="300" width="320" height="85" fill="#fff" stroke="#e2e8f0" rx="4"/>
  <text x="52" y="318" font-size="10" fill="#1a202c" font-weight="600">典型 CDR 长度（Kabat 统计量级）</text>
  <text x="52" y="338" font-size="9" fill="#2b6cb0">H1 ████</text>
  <text x="52" y="354" font-size="9" fill="#2b6cb0">H2 ██████████</text>
  <text x="52" y="370" font-size="9" fill="#9b2c2c">H3 ████████████████（最可变）</text>
  <text x="200" y="338" font-size="9" fill="#276749">L1 ███████████</text>
  <text x="200" y="354" font-size="9" fill="#276749">L2 ███（最短）</text>
  <text x="200" y="370" font-size="9" fill="#276749">L3 ██████</text>
  <rect x="400" y="300" width="320" height="85" fill="#fff" stroke="#e2e8f0" rx="4"/>
  <text x="412" y="318" font-size="10" fill="#1a202c" font-weight="600">规范结构（canonical structure）</text>
  <text x="412" y="338" font-size="9" fill="#4a5568">• L1/L2/L3、H1/H2 常落入有限构象类</text>
  <text x="412" y="354" font-size="9" fill="#4a5568">• H3 构象类多、预测难，是设计重点</text>
  <text x="412" y="370" font-size="9" fill="#4a5568">• 规范类由 FR 长度与关键残基决定</text>
</svg>