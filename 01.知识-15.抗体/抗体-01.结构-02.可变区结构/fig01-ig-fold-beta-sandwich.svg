<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 420" font-family="Segoe UI, 'Microsoft YaHei', sans-serif">
  <defs>
    <linearGradient id="sheetA" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#63b3ed"/><stop offset="100%" stop-color="#2b6cb0"/>
    </linearGradient>
    <linearGradient id="sheetB" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#9ae6b4"/><stop offset="100%" stop-color="#276749"/>
    </linearGradient>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#4a5568"/>
    </marker>
  </defs>
  <rect width="720" height="420" fill="#fafafa"/>
  <text x="360" y="26" text-anchor="middle" font-size="15" fill="#1a202c" font-weight="600">图 1　免疫球蛋白折叠（Ig fold）：双层 β 折叠片与 CDR 环出口</text>
  <text x="360" y="44" text-anchor="middle" font-size="10" fill="#718096">VH/VL 共享拓扑；β 链按 Chothia 命名；环区走向因 CDR 而异（示意，对照 PDB 如 1HZH）</text>
  <ellipse cx="300" cy="210" rx="155" ry="115" fill="#edf2f7" stroke="#cbd5e0" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="300" y="88" text-anchor="middle" font-size="11" fill="#4a5568">可变域（VH 或 VL）</text>
  <g transform="translate(155, 125)">
    <text x="0" y="-8" font-size="10" fill="#2b6cb0" font-weight="600">片 A（外侧，含 FR1–FR3 主链段）</text>
    <rect x="0" y="0" width="18" height="72" fill="url(#sheetA)" rx="2"/><text x="9" y="42" text-anchor="middle" font-size="8" fill="#fff">A</text>
    <rect x="28" y="8" width="18" height="64" fill="url(#sheetA)" rx="2"/><text x="37" y="44" text-anchor="middle" font-size="8" fill="#fff">B</text>
    <rect x="56" y="16" width="18" height="56" fill="url(#sheetA)" rx="2"/><text x="65" y="48" text-anchor="middle" font-size="8" fill="#fff">E</text>
    <rect x="84" y="24" width="18" height="48" fill="url(#sheetA)" rx="2"/><text x="93" y="52" text-anchor="middle" font-size="8" fill="#fff">D</text>
  </g>
  <g transform="translate(195, 155)">
    <text x="0" y="-8" font-size="10" fill="#276749" font-weight="600">片 B（内侧，含 FR4 等）</text>
    <rect x="0" y="0" width="18" height="68" fill="url(#sheetB)" rx="2"/><text x="9" y="40" text-anchor="middle" font-size="8" fill="#fff">C</text>
    <rect x="22" y="6" width="14" height="56" fill="url(#sheetB)" rx="2"/><text x="29" y="40" text-anchor="middle" font-size="7" fill="#fff">C'</text>
    <rect x="40" y="12" width="14" height="50" fill="url(#sheetB)" rx="2"/><text x="47" y="42" text-anchor="middle" font-size="7" fill="#fff">C''</text>
    <rect x="62" y="18" width="18" height="44" fill="url(#sheetB)" rx="2"/><text x="71" y="44" text-anchor="middle" font-size="8" fill="#fff">F</text>
    <rect x="90" y="26" width="18" height="36" fill="url(#sheetB)" rx="2"/><text x="99" y="48" text-anchor="middle" font-size="8" fill="#fff">G</text>
  </g>
  <path d="M 183 125 Q 165 95 148 78 Q 130 62 115 55" fill="none" stroke="#dd6b20" stroke-width="4.5" stroke-linecap="round"/>
  <text x="108" y="48" font-size="10" fill="#c05621" font-weight="600">CDR1</text>
  <text x="108" y="60" font-size="8" fill="#975a16">（L1/H1）</text>
  <path d="M 211 133 Q 238 108 268 98 Q 290 92 310 88" fill="none" stroke="#dd6b20" stroke-width="4" stroke-linecap="round"/>
  <text x="315" y="82" font-size="10" fill="#c05621" font-weight="600">CDR2</text>
  <path d="M 183 197 Q 155 230 138 268 Q 122 300 108 328" fill="none" stroke="#c05621" stroke-width="5.5" stroke-linecap="round"/>
  <text x="95" y="345" font-size="10" fill="#9b2c2c" font-weight="600">CDR3</text>
  <text x="95" y="357" font-size="8" fill="#9b2c2c">H3 最长；L3 较短</text>
  <ellipse cx="268" cy="210" rx="42" ry="28" fill="#fefcbf" fill-opacity="0.6" stroke="#d69e2e" stroke-width="1.5"/>
  <text x="268" y="206" text-anchor="middle" font-size="9" fill="#744210">疏水</text>
  <text x="268" y="218" text-anchor="middle" font-size="9" fill="#744210">核心</text>
  <path d="M 200 160 Q 230 140 255 175" fill="none" stroke="#e53e3e" stroke-width="2" stroke-dasharray="4 3"/>
  <text x="228" y="138" font-size="8" fill="#c53030">域内 Cys–Cys</text>
  <path d="M 340 210 L 390 210" stroke="#4a5568" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="400" y="214" font-size="10" fill="#4a5568">抗原表位方向</text>
  <rect x="430" y="95" width="270" height="250" fill="#fff" stroke="#e2e8f0" rx="5"/>
  <text x="445" y="118" font-size="11" fill="#1a202c" font-weight="600">读图要点</text>
  <text x="445" y="140" font-size="10" fill="#4a5568">• FR 主要构成 β 链与疏水核心</text>
  <text x="445" y="160" font-size="10" fill="#4a5568">• CDR 连接 β 链间环，伸向互补位</text>
  <text x="445" y="180" font-size="10" fill="#4a5568">• 两 β 片反平行堆叠 ≈「三明治」</text>
  <text x="445" y="200" font-size="10" fill="#4a5568">• VH 与 VL 折叠同源，环长/序列不同</text>
  <text x="445" y="228" font-size="10" fill="#2b6cb0" font-weight="600">与恒定域 CL/CH1 的关系</text>
  <text x="445" y="248" font-size="10" fill="#4a5568">恒定域同为 Ig 折叠，但表面</text>
  <text x="445" y="264" font-size="10" fill="#4a5568">无高变环；C 端与下一域相连</text>
  <text x="445" y="292" font-size="9" fill="#718096">拓扑依据 Chothia &amp; Lesk (1987)</text>
  <text x="445" y="308" font-size="9" fill="#718096">具体环构象见图 4</text>
  <text x="445" y="330" font-size="9" fill="#718096">PDB 1HZH：人源 Fab 高分辨率</text>
</svg>