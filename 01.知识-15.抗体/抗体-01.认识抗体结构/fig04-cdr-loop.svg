<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 400" font-family="Segoe UI, 'Microsoft YaHei', sans-serif">
  <defs>
    <linearGradient id="vhfill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#63b3ed"/><stop offset="100%" stop-color="#2b6cb0"/>
    </linearGradient>
    <linearGradient id="vlfill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9ae6b4"/><stop offset="100%" stop-color="#276749"/>
    </linearGradient>
  </defs>
  <rect width="680" height="400" fill="#fafafa"/>
  <text x="340" y="26" text-anchor="middle" font-size="15" fill="#1a202c" font-weight="600">图 4　VH 与 VL 的界面：β 折叠域主体 + 伸向互补位的 CDR 环</text>
  <text x="340" y="44" text-anchor="middle" font-size="10" fill="#718096">两域相对旋转形成裂隙；橙色曲线示环区（非矩形框拼接）</text>

  <!-- VH 左 -->
  <g transform="rotate(-12 220 190)">
    <ellipse cx="220" cy="190" rx="100" ry="62" fill="url(#vhfill)" fill-opacity="0.28" stroke="#2b6cb0" stroke-width="2.5"/>
    <text x="220" y="185" text-anchor="middle" font-size="14" fill="#1a365d" font-weight="600">VH</text>
    <text x="220" y="202" text-anchor="middle" font-size="9" fill="#2d3748">Ig 折叠</text>
  </g>
  <!-- 右缘 CDR-H（朝向界面） -->
  <path d="M 300 155 Q 330 130 338 165 Q 342 185 325 198" fill="none" stroke="#dd6b20" stroke-width="4" stroke-linecap="round"/>
  <text x="345" y="148" font-size="9" fill="#c05621" font-weight="600">H1</text>
  <path d="M 305 178 Q 338 172 348 198 Q 352 215 332 228" fill="none" stroke="#dd6b20" stroke-width="4" stroke-linecap="round"/>
  <text x="355" y="188" font-size="9" fill="#c05621" font-weight="600">H2</text>
  <path d="M 295 205 Q 318 248 308 275 Q 298 295 280 305" fill="none" stroke="#c05621" stroke-width="5.5" stroke-linecap="round"/>
  <text x="318" y="268" font-size="10" fill="#9b2c2c" font-weight="600">H3</text>

  <!-- VL 右 -->
  <g transform="rotate(12 460 190)">
    <ellipse cx="460" cy="190" rx="96" ry="58" fill="url(#vlfill)" fill-opacity="0.28" stroke="#276749" stroke-width="2.5"/>
    <text x="460" y="185" text-anchor="middle" font-size="14" fill="#22543d" font-weight="600">VL</text>
    <text x="460" y="202" text-anchor="middle" font-size="9" fill="#2d3748">Ig 折叠</text>
  </g>
  <!-- 左缘 CDR-L -->
  <path d="M 380 150 Q 350 128 340 158 Q 335 178 352 188" fill="none" stroke="#dd6b20" stroke-width="4" stroke-linecap="round"/>
  <text x="325" y="140" font-size="9" fill="#c05621" font-weight="600">L1</text>
  <path d="M 375 182 Q 345 182 336 205 Q 332 222 348 232" fill="none" stroke="#dd6b20" stroke-width="4" stroke-linecap="round"/>
  <text x="318" y="198" font-size="9" fill="#c05621" font-weight="600">L2</text>
  <path d="M 385 210 Q 358 238 352 265 Q 348 285 365 298" fill="none" stroke="#dd6b20" stroke-width="4.5" stroke-linecap="round"/>
  <text x="335" y="258" font-size="9" fill="#c05621" font-weight="600">L3</text>

  <!-- 抗原 -->
  <ellipse cx="340" cy="210" rx="28" ry="78" fill="#feb2b2" fill-opacity="0.22" stroke="#e53e3e" stroke-width="2" transform="rotate(-6 340 210)"/>
  <text x="340" y="340" text-anchor="middle" font-size="11" fill="#742a2a">抗原表位嵌入 VH–VL 裂隙；CDR-H3 常主导接触</text>
  <text x="340" y="362" text-anchor="middle" font-size="10" fill="#4a5568">FR 位于域内核与边缘，维持折叠与配对几何（未单独画环）</text>
  <text x="340" y="382" text-anchor="middle" font-size="9" fill="#718096">示意拓扑；精细构象以高分辨率结构为准</text>
</svg>
