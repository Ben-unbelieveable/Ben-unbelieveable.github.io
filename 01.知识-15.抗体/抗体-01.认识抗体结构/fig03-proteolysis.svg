<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 535" font-family="Segoe UI, 'Microsoft YaHei', sans-serif">
  <defs>
    <linearGradient id="gh" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2c5282"/><stop offset="100%" stop-color="#4a6fa5"/>
    </linearGradient>
    <linearGradient id="gl" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#718096"/><stop offset="100%" stop-color="#a0aec0"/>
    </linearGradient>
  </defs>
  <rect width="800" height="535" fill="#fafafa"/>
  <text x="400" y="24" text-anchor="middle" font-size="15" fill="#1a202c" font-weight="600">图 3　铰链区酶切位点与主要产物（与 CH1 / hinge / CH2 相对位置）</text>

  <!-- A 完整分子 -->
  <text x="400" y="48" text-anchor="middle" font-size="11" fill="#4a5568" font-weight="600">A　完整 IgG（域级拓扑）</text>
  <g transform="translate(400,115)">
    <ellipse cx="-130" cy="-35" rx="26" ry="16" fill="url(#gh)"/><text x="-130" y="-31" text-anchor="middle" font-size="8" fill="#fff">VH</text>
    <ellipse cx="-85" cy="-35" rx="26" ry="16" fill="url(#gl)"/><text x="-85" y="-31" text-anchor="middle" font-size="8" fill="#1a202c">VL</text>
    <line x1="-130" y1="-19" x2="-130" y2="-8" stroke="#1a365d" stroke-width="2.5"/><line x1="-85" y1="-19" x2="-85" y2="-8" stroke="#4a5568" stroke-width="2"/>
    <ellipse cx="-130" cy="8" rx="26" ry="16" fill="url(#gh)"/><text x="-130" y="12" text-anchor="middle" font-size="8" fill="#fff">CH1</text>
    <ellipse cx="-85" cy="8" rx="26" ry="16" fill="url(#gl)"/><text x="-85" y="12" text-anchor="middle" font-size="8" fill="#1a202c">CL</text>
    <ellipse cx="85" cy="-35" rx="26" ry="16" fill="url(#gh)"/><text x="85" y="-31" text-anchor="middle" font-size="8" fill="#fff">VH</text>
    <ellipse cx="130" cy="-35" rx="26" ry="16" fill="url(#gl)"/><text x="130" y="-31" text-anchor="middle" font-size="8" fill="#1a202c">VL</text>
    <line x1="85" y1="-19" x2="85" y2="-8" stroke="#1a365d" stroke-width="2.5"/><line x1="130" y1="-19" x2="130" y2="-8" stroke="#4a5568" stroke-width="2"/>
    <ellipse cx="85" cy="8" rx="26" ry="16" fill="url(#gh)"/><ellipse cx="130" cy="8" rx="26" ry="16" fill="url(#gl)"/>
    <path d="M -105 25 Q 0 48 0 62 Q 0 76 -105 99 M 105 25 Q 0 48 0 62 Q 0 76 105 99" fill="none" stroke="#d69e2e" stroke-width="4"/>
    <text x="0" y="58" text-anchor="middle" font-size="9" fill="#975a16" font-weight="600">hinge</text>
    <ellipse cx="-28" cy="118" rx="28" ry="17" fill="#5a67d8" fill-opacity="0.92"/><ellipse cx="28" cy="118" rx="28" ry="17" fill="#5a67d8" fill-opacity="0.92"/>
    <text x="-28" y="122" text-anchor="middle" font-size="8" fill="#fff">CH2</text><text x="28" y="122" text-anchor="middle" font-size="8" fill="#fff">CH2</text>
    <line x1="-28" y1="135" x2="-28" y2="148" stroke="#1a365d" stroke-width="2.5"/><line x1="28" y1="135" x2="28" y2="148" stroke="#1a365d" stroke-width="2.5"/>
    <ellipse cx="-28" cy="168" rx="28" ry="17" fill="url(#gh)"/><ellipse cx="28" cy="168" rx="28" ry="17" fill="url(#gh)"/>
    <text x="-28" y="172" text-anchor="middle" font-size="8" fill="#fff">CH3</text><text x="28" y="172" text-anchor="middle" font-size="8" fill="#fff">CH3</text>
    <text x="-195" y="12" font-size="9" fill="#2b6cb0">papain 切点</text>
    <line x1="-115" y1="18" x2="-95" y2="22" stroke="#3182ce" stroke-width="1.2"/>
    <text x="195" y="75" font-size="9" fill="#6b46c1">pepsin 切点</text>
    <line x1="95" y1="85" x2="55" y2="100" stroke="#805ad5" stroke-width="1.2"/>
  </g>

  <!-- B papain -->
  <text x="400" y="248" text-anchor="middle" font-size="11" fill="#2b6cb0" font-weight="600">B　木瓜蛋白酶（papain）：CH1 与铰链连接处附近切开</text>
  <g transform="translate(400,310)">
    <text x="0" y="-58" text-anchor="middle" font-size="14">✂ papain</text>
    <g transform="translate(-220,0)">
      <ellipse cx="-35" cy="0" rx="24" ry="15" fill="url(#gh)"/><ellipse cx="5" cy="0" rx="24" ry="15" fill="url(#gl)"/>
      <line x1="-35" y1="15" x2="-35" y2="26" stroke="#1a365d" stroke-width="2"/><line x1="5" y1="15" x2="5" y2="26" stroke="#4a5568" stroke-width="1.5"/>
      <ellipse cx="-35" cy="38" rx="24" ry="15" fill="url(#gh)"/><ellipse cx="5" cy="38" rx="24" ry="15" fill="url(#gl)"/>
      <text x="-15" y="62" text-anchor="middle" font-size="9" fill="#4a5568">Fab</text>
    </g>
    <g transform="translate(-60,0)">
      <ellipse cx="-35" cy="0" rx="24" ry="15" fill="url(#gh)"/><ellipse cx="5" cy="0" rx="24" ry="15" fill="url(#gl)"/>
      <line x1="-35" y1="15" x2="-35" y2="26" stroke="#1a365d" stroke-width="2"/><line x1="5" y1="15" x2="5" y2="26" stroke="#4a5568" stroke-width="1.5"/>
      <ellipse cx="-35" cy="38" rx="24" ry="15" fill="url(#gh)"/><ellipse cx="5" cy="38" rx="24" ry="15" fill="url(#gl)"/>
      <text x="-15" y="62" text-anchor="middle" font-size="9" fill="#4a5568">Fab</text>
    </g>
    <g transform="translate(120,5)">
      <ellipse cx="-30" cy="-5" rx="25" ry="16" fill="#5a67d8" fill-opacity="0.92"/><ellipse cx="30" cy="-5" rx="25" ry="16" fill="#5a67d8" fill-opacity="0.92"/>
      <line x1="-30" y1="11" x2="-30" y2="24" stroke="#1a365d" stroke-width="2"/><line x1="30" y1="11" x2="30" y2="24" stroke="#1a365d" stroke-width="2"/>
      <ellipse cx="-30" cy="42" rx="25" ry="16" fill="url(#gh)"/><ellipse cx="30" cy="42" rx="25" ry="16" fill="url(#gh)"/>
      <text x="0" y="72" text-anchor="middle" font-size="9" fill="#6b46c1">Fc（双 CH2-CH3）</text>
    </g>
    <text x="0" y="95" text-anchor="middle" font-size="10" fill="#2d3748">2×Fab（单价） + 1×Fc</text>
  </g>

  <!-- C pepsin -->
  <text x="400" y="398" text-anchor="middle" font-size="11" fill="#6b46c1" font-weight="600">C　胃蛋白酶（pepsin）：铰链另一侧，保留 Fab′ 间二硫键</text>
  <g transform="translate(400,455)">
    <text x="0" y="-35" text-anchor="middle" font-size="14">✂ pepsin</text>
    <ellipse cx="-95" cy="0" rx="22" ry="14" fill="url(#gh)"/><ellipse cx="-65" cy="0" rx="22" ry="14" fill="url(#gl)"/>
    <ellipse cx="65" cy="0" rx="22" ry="14" fill="url(#gh)"/><ellipse cx="95" cy="0" rx="22" ry="14" fill="url(#gl)"/>
    <path d="M -45 0 Q 0 18 45 0" fill="none" stroke="#d69e2e" stroke-width="3"/>
    <text x="0" y="22" text-anchor="middle" font-size="8" fill="#975a16">hinge S-S</text>
    <line x1="-95" y1="14" x2="-95" y2="26" stroke="#1a365d" stroke-width="2"/><line x1="-65" y1="14" x2="-65" y2="26" stroke="#4a5568" stroke-width="1.5"/>
    <line x1="95" y1="14" x2="95" y2="26" stroke="#1a365d" stroke-width="2"/><line x1="65" y1="14" x2="65" y2="26" stroke="#4a5568" stroke-width="1.5"/>
    <ellipse cx="-95" cy="40" rx="22" ry="14" fill="url(#gh)"/><ellipse cx="-65" cy="40" rx="22" ry="14" fill="url(#gl)"/>
    <ellipse cx="95" cy="40" rx="22" ry="14" fill="url(#gh)"/><ellipse cx="65" cy="40" rx="22" ry="14" fill="url(#gl)"/>
    <text x="0" y="68" text-anchor="middle" font-size="10" fill="#2d3748">F(ab′)₂（双价） + pFc′ 等小片段</text>
  </g>
</svg>
