<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 520" font-family="Segoe UI, Microsoft YaHei, PingFang SC, sans-serif">
  <defs>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto"><polygon points="0,0 9,4.5 0,9" fill="#4a5568"/></marker>
    <style><![CDATA[
      .title{font-size:17px;font-weight:700;fill:#1a202c}.sub{font-size:10.5px;fill:#718096}
      .pipe-title{font-size:13px;font-weight:700;fill:#1a202c}.box{font-size:10px;fill:#2d3748}
      .cap{font-size:9px;fill:#718096}.fmt{font-size:9.5px;fill:#553c9a;font-weight:600}
    ]]></style>
  </defs>
  <rect width="920" height="520" fill="#fafafa"/>
  <text x="460" y="32" text-anchor="middle" class="title">图 3　一体化开源 Pipeline 对比（2024–2025）</text>
  <text x="460" y="52" text-anchor="middle" class="sub">三条路线均从「表位约束 + 框架模板」出发，差异在骨架生成与过滤模型</text>
  <rect x="30" y="72" width="270" height="400" rx="10" fill="#fff5f5" stroke="#fc8181" stroke-width="1.5"/>
  <text x="165" y="98" text-anchor="middle" class="pipe-title">RFantibody</text>
  <text x="165" y="116" text-anchor="middle" class="fmt">Fab / VHH · MIT</text>
  <rect x="50" y="132" width="230" height="52" rx="6" fill="#fed7d7" stroke="#e53e3e"/>
  <text x="165" y="154" text-anchor="middle" class="box" font-weight="600">① RFdiffusion（抗体微调）</text>
  <text x="165" y="170" text-anchor="middle" class="cap">表位靶向 CDR 骨架扩散</text>
  <line x1="165" y1="184" x2="165" y2="202" stroke="#4a5568" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="50" y="202" width="230" height="52" rx="6" fill="#feebc8" stroke="#dd6b20"/>
  <text x="165" y="224" text-anchor="middle" class="box" font-weight="600">② ProteinMPNN</text>
  <text x="165" y="240" text-anchor="middle" class="cap">仅设计 CDR 环序列</text>
  <line x1="165" y1="254" x2="165" y2="272" stroke="#4a5568" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="50" y="272" width="230" height="52" rx="6" fill="#e9d8fd" stroke="#805ad5"/>
  <text x="165" y="294" text-anchor="middle" class="box" font-weight="600">③ RF2（抗体微调）过滤</text>
  <text x="165" y="310" text-anchor="middle" class="cap">in silico 结构置信度筛选</text>
  <text x="165" y="360" text-anchor="middle" class="cap">适合：工业 Rosetta 生态</text>
  <text x="165" y="378" text-anchor="middle" class="cap">全长 Fab + HLT 格式输入</text>
  <text x="165" y="448" text-anchor="middle" class="box" fill="#c53030">→ 步骤 6–8 后处理</text>
  <rect x="325" y="72" width="270" height="400" rx="10" fill="#f0fff4" stroke="#68d391" stroke-width="1.5"/>
  <text x="460" y="98" text-anchor="middle" class="pipe-title">Germinal</text>
  <text x="460" y="116" text-anchor="middle" class="fmt">VHH / scFv · GPU</text>
  <rect x="345" y="132" width="230" height="52" rx="6" fill="#c6f6d5" stroke="#38a169"/>
  <text x="460" y="154" text-anchor="middle" class="box" font-weight="600">① ColabDesign hallucination</text>
  <text x="460" y="170" text-anchor="middle" class="cap">AF-Multimer 梯度 + 表位约束</text>
  <line x1="460" y1="184" x2="460" y2="202" stroke="#4a5568" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="345" y="202" width="230" height="52" rx="6" fill="#feebc8" stroke="#dd6b20"/>
  <text x="460" y="224" text-anchor="middle" class="box" font-weight="600">② AbMPNN 选择性重设计</text>
  <text x="460" y="240" text-anchor="middle" class="cap">AbLang / IgLM 可选梯度引导</text>
  <line x1="460" y1="254" x2="460" y2="272" stroke="#4a5568" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="345" y="272" width="230" height="52" rx="6" fill="#e9d8fd" stroke="#805ad5"/>
  <text x="460" y="294" text-anchor="middle" class="box" font-weight="600">③ AF3 / AF2 共折叠过滤</text>
  <text x="460" y="310" text-anchor="middle" class="cap">ipTM、界面接触、PyRosetta</text>
  <text x="460" y="360" text-anchor="middle" class="cap">适合：表位明确纳米抗体</text>
  <text x="460" y="378" text-anchor="middle" class="cap">epitope 残基列表直接约束</text>
  <text x="460" y="448" text-anchor="middle" class="box" fill="#276749">→ 步骤 6–8 后处理</text>
  <rect x="620" y="72" width="270" height="400" rx="10" fill="#ebf8ff" stroke="#63b3ed" stroke-width="1.5"/>
  <text x="755" y="98" text-anchor="middle" class="pipe-title">mBER</text>
  <text x="755" y="116" text-anchor="middle" class="fmt">VHH（mber-vhh）· 模块化</text>
  <rect x="640" y="132" width="230" height="52" rx="6" fill="#bee3f8" stroke="#3182ce"/>
  <text x="755" y="154" text-anchor="middle" class="box" font-weight="600">① Template 模块</text>
  <text x="755" y="170" text-anchor="middle" class="cap">热点识别 + 初始模板准备</text>
  <line x1="755" y1="184" x2="755" y2="202" stroke="#4a5568" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="640" y="202" width="230" height="52" rx="6" fill="#c6f6d5" stroke="#38a169"/>
  <text x="755" y="224" text-anchor="middle" class="box" font-weight="600">② Trajectory 反传优化</text>
  <text x="755" y="240" text-anchor="middle" class="cap">ColabDesign + AF-Multimer</text>
  <line x1="755" y1="254" x2="755" y2="272" stroke="#4a5568" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="640" y="272" width="230" height="52" rx="6" fill="#e9d8fd" stroke="#805ad5"/>
  <text x="755" y="294" text-anchor="middle" class="box" font-weight="600">③ Evaluation 多维评估</text>
  <text x="755" y="310" text-anchor="middle" class="cap">YAML 配置、可插拔指标</text>
  <text x="755" y="360" text-anchor="middle" class="cap">适合：可配置 VHH 设计</text>
  <text x="755" y="378" text-anchor="middle" class="cap">模板 + 序列条件反传</text>
  <text x="755" y="448" text-anchor="middle" class="box" fill="#2b6cb0">→ 步骤 6–8 后处理</text>
  <rect x="30" y="482" width="860" height="28" rx="6" fill="#edf2f7" stroke="#a0aec0"/>
  <text x="460" y="501" text-anchor="middle" class="sub">DiffAb / ColabDesign 自研脚本：步骤 2–3 模块化替代，见 §11 选型速查</text>
</svg>