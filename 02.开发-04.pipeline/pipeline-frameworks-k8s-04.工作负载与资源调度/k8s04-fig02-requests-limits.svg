<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="720" height="260" viewBox="0 0 720 260">
  <defs>
    <style><![CDATA[
      .t{font:bold 13px Arial,Helvetica,sans-serif;fill:#1a202c}
      .l{font:11px Arial,Helvetica,sans-serif;fill:#2d3748}
      .req{fill:#c6f6d5;stroke:#276749;stroke-width:1.2}
      .lim{fill:#fed7d7;stroke:#c53030;stroke-width:1.2}
      .use{fill:#90cdf4;stroke:#2b6cb0;stroke-width:1}
    ]]></style>
  </defs>
  <rect width="100%" height="100%" fill="#fff"/>
  <text x="360" y="24" text-anchor="middle" class="t">Fig.2 requests vs limits on one resource dimension (e.g. memory)</text>
  <text x="360" y="48" text-anchor="middle" class="l" font-size="10px">scheduler uses requests; kubelet enforces limits at runtime</text>
  <rect x="80" y="70" width="560" height="36" class="req" rx="2"/>
  <text x="100" y="92" class="l">0</text>
  <text x="360" y="92" text-anchor="middle" class="l" font-size="10px">requests: guaranteed scheduling quota (node must have allocatable)</text>
  <rect x="80" y="120" width="560" height="50" class="lim" rx="2"/>
  <text x="360" y="140" text-anchor="middle" class="l" font-size="10px">limits: hard cap; OOMKill if container exceeds (Linux cgroup)</text>
  <rect x="200" y="132" width="80" height="26" class="use"/>
  <text x="240" y="149" text-anchor="middle" class="l" font-size="10px">actual use</text>
  <text x="360" y="200" text-anchor="middle" class="l">If use &gt; limits: container may be killed. If sum requests &gt; node allocatable: Pod stays Pending.</text>
  <text x="360" y="230" text-anchor="middle" class="l" font-size="10px">QoS classes: Guaranteed / Burstable / BestEffort depend on requests vs limits relationship</text>
</svg>
