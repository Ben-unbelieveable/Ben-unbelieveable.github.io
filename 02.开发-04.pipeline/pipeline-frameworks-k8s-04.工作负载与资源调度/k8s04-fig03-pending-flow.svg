<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="760" height="280" viewBox="0 0 760 280">
  <defs>
    <style><![CDATA[
      .t{font:bold 13px Arial,Helvetica,sans-serif;fill:#1a202c}
      .l{font:11px Arial,Helvetica,sans-serif;fill:#2d3748}
      .box{fill:#fffaf0;stroke:#c05621;stroke-width:1.2}
      .ok{fill:#e6fffa;stroke:#319795;stroke-width:1.2}
      .arr{stroke:#2c5282;stroke-width:1.2;fill:none;marker-end:url(#m)}
    ]]></style>
    <marker id="m" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto"><polygon points="0 0,7 3.5,0 7" fill="#2c5282"/></marker>
  </defs>
  <rect width="100%" height="100%" fill="#fff"/>
  <text x="380" y="24" text-anchor="middle" class="t">Fig.3 When Pod stays Pending: common checks (order is typical, not absolute)</text>
  <rect x="40" y="48" width="140" height="44" class="box" rx="4"/><text x="110" y="76" text-anchor="middle" class="l">Pod Pending</text>
  <line x1="180" y1="70" x2="230" y2="70" class="arr"/>
  <rect x="230" y="48" width="200" height="44" class="box" rx="4"/><text x="330" y="72" text-anchor="middle" class="l" font-size="10px">kubectl describe pod</text>
  <text x="330" y="88" text-anchor="middle" class="l" font-size="9px">Events + Conditions</text>
  <line x1="430" y1="70" x2="480" y2="70" class="arr"/>
  <rect x="480" y="44" width="240" height="52" class="ok" rx="4"/>
  <text x="600" y="68" text-anchor="middle" class="l">Scheduler: resources / taints /</text>
  <text x="600" y="84" text-anchor="middle" class="l" font-size="10px">affinity / PVC not bound?</text>
  <rect x="80" y="130" width="200" height="40" class="box" rx="3"/><text x="180" y="154" text-anchor="middle" class="l">After Scheduled: ImagePullBackOff</text>
  <rect x="300" y="130" width="200" height="40" class="box" rx="3"/><text x="400" y="154" text-anchor="middle" class="l">registry auth / tag typo</text>
  <rect x="520" y="130" width="200" height="40" class="box" rx="3"/><text x="620" y="154" text-anchor="middle" class="l">CrashLoopBackOff</text>
  <text x="380" y="200" text-anchor="middle" class="l">OOMKilled: container hit memory limit (limits)  adjust or fix leak</text>
  <text x="380" y="230" text-anchor="middle" class="l" font-size="10px">Align with k8s-01 Fig.5: step 4 = schedule bind; step 5 = kubelet + runtime on node</text>
</svg>
