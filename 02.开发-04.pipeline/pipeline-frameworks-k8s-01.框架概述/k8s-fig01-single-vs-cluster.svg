<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="820" height="280" viewBox="0 0 820 280">
  <defs>
    <style type="text/css"><![CDATA[
      .title { font: bold 13px Arial, Helvetica, sans-serif; fill: #1a202c; }
      .lbl { font: 12px Arial, Helvetica, sans-serif; fill: #2d3748; }
      .small { font: 11px Arial, Helvetica, sans-serif; fill: #4a5568; }
      .box { fill: #f7fafc; stroke: #2c5282; stroke-width: 1.2; }
      .box2 { fill: #ebf8ff; stroke: #2b6cb0; stroke-width: 1.2; }
      .arr { stroke: #2c5282; stroke-width: 1.5; fill: none; marker-end: url(#m); }
    ]]></style>
    <marker id="m" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <polygon points="0 0, 8 4, 0 8" fill="#2c5282"/>
    </marker>
  </defs>
  <rect width="100%" height="100%" fill="#ffffff"/>
  <text x="410" y="22" text-anchor="middle" class="title" font-size="14px">Fig.1 Single-machine docker vs Kubernetes cluster (schematic)</text>
  <rect x="24" y="44" width="360" height="210" rx="4" fill="none" stroke="#cbd5e0" stroke-dasharray="4 3"/>
  <text x="204" y="64" text-anchor="middle" class="title">Single host (direct)</text>
  <rect x="120" y="92" width="100" height="36" class="box" rx="3"/>
  <text x="170" y="114" text-anchor="middle" class="lbl">docker run</text>
  <line x1="170" y1="128" x2="170" y2="158" class="arr"/>
  <rect x="110" y="162" width="120" height="40" class="box2" rx="3"/>
  <text x="170" y="186" text-anchor="middle" class="lbl">Container</text>
  <text x="204" y="232" text-anchor="middle" class="small">User runs the container directly</text>
  <rect x="404" y="44" width="392" height="210" rx="4" fill="none" stroke="#cbd5e0" stroke-dasharray="4 3"/>
  <text x="600" y="64" text-anchor="middle" class="title">Kubernetes cluster (declare then schedule)</text>
  <rect x="424" y="84" width="56" height="32" class="box" rx="3"/>
  <text x="452" y="104" text-anchor="middle" class="small">YAML</text>
  <line x1="480" y1="100" x2="508" y2="100" class="arr"/>
  <rect x="508" y="84" width="52" height="32" class="box" rx="3"/>
  <text x="534" y="104" text-anchor="middle" class="small">API</text>
  <line x1="560" y1="100" x2="588" y2="100" class="arr"/>
  <rect x="588" y="78" width="72" height="44" class="box2" rx="3"/>
  <text x="624" y="104" text-anchor="middle" class="lbl">Control plane</text>
  <line x1="624" y1="122" x2="500" y2="168" class="arr"/>
  <line x1="624" y1="122" x2="700" y2="168" class="arr"/>
  <rect x="448" y="176" width="104" height="52" class="box" rx="3"/>
  <text x="500" y="198" text-anchor="middle" class="lbl">Node A</text>
  <text x="500" y="216" text-anchor="middle" class="small">Pod</text>
  <rect x="648" y="176" width="104" height="52" class="box" rx="3"/>
  <text x="700" y="198" text-anchor="middle" class="lbl">Node B</text>
  <text x="700" y="216" text-anchor="middle" class="small">Pod</text>
  <text x="600" y="252" text-anchor="middle" class="small">Declare desired state; control plane places Pods on nodes</text>
</svg>
