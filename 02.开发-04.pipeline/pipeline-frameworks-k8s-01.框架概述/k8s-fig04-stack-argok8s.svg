<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="720" height="280" viewBox="0 0 720 280">
  <defs>
    <style type="text/css"><![CDATA[
      .title { font: bold 14px Arial, Helvetica, sans-serif; fill: #1a202c; }
      .lbl { font: 12px Arial, Helvetica, sans-serif; fill: #2d3748; }
      .sub { font: 11px Arial, Helvetica, sans-serif; fill: #4a5568; }
      .cap { font: 11px Arial, Helvetica, sans-serif; fill: #718096; }
      .layer1 { fill: #f0fff4; stroke: #276749; stroke-width: 1.3; }
      .layer2 { fill: #ebf8ff; stroke: #2b6cb0; stroke-width: 1.3; }
      .layer3 { fill: #faf5ff; stroke: #6b46c1; stroke-width: 1.3; }
      .arr { stroke: #2d3748; stroke-width: 1.5; fill: none; marker-end: url(#ms); }
    ]]></style>
    <marker id="ms" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <polygon points="0 0, 8 4, 0 8" fill="#2d3748"/>
    </marker>
  </defs>
  <rect width="100%" height="100%" fill="#ffffff"/>
  <text x="360" y="24" text-anchor="middle" class="title">Fig.4 Stack: container image to Kubernetes to Argo (schematic)</text>
  <rect x="80" y="52" width="560" height="56" class="layer3" rx="4"/>
  <text x="360" y="76" text-anchor="middle" class="lbl" font-weight="bold">Application / workflow</text>
  <text x="360" y="94" text-anchor="middle" class="sub">Argo Workflows (DAG, retries, artifacts)</text>
  <line x1="360" y1="108" x2="360" y2="128" class="arr"/>
  <text x="378" y="122" class="cap">creates Pods, Jobs, ...</text>
  <rect x="80" y="128" width="560" height="56" class="layer2" rx="4"/>
  <text x="360" y="152" text-anchor="middle" class="lbl" font-weight="bold">Orchestration</text>
  <text x="360" y="170" text-anchor="middle" class="sub">Kubernetes (schedule, resources, Pod / Job)</text>
  <line x1="360" y1="184" x2="360" y2="204" class="arr"/>
  <text x="378" y="198" class="cap">pull image and run</text>
  <rect x="80" y="204" width="560" height="56" class="layer1" rx="4"/>
  <text x="360" y="228" text-anchor="middle" class="lbl" font-weight="bold">Packaging (container images)</text>
  <text x="360" y="246" text-anchor="middle" class="sub">e.g. BWA, GATK, tool images</text>
  <text x="360" y="272" text-anchor="middle" class="cap">Argo builds on K8s; images remain the environment unit</text>
</svg>
