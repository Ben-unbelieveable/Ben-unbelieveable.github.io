<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="960" height="720" viewBox="0 0 960 720">
  <defs>
    <style type="text/css"><![CDATA[
      .title { font: bold 15px Arial, Helvetica, sans-serif; fill: #1a202c; }
      .h1 { font: bold 12px Arial, Helvetica, sans-serif; fill: #2d3748; }
      .txt { font: 11px Arial, Helvetica, sans-serif; fill: #2d3748; }
      .small { font: 10px Arial, Helvetica, sans-serif; fill: #4a5568; }
      .leg { font: 10px Arial, Helvetica, sans-serif; fill: #1a202c; }
      .box { fill: #fff; stroke: #4a5568; stroke-width: 1.2; }
      .box-api { fill: #ebf8ff; stroke: #2b6cb0; stroke-width: 2; }
      .box-etcd { fill: #faf5ff; stroke: #6b46c1; stroke-width: 1.2; }
      .box-cp { fill: #edf2f7; stroke: #4a5568; stroke-width: 1.2; }
      .box-node { fill: #f7fafc; stroke: #2c5282; stroke-width: 1.3; }
      .box-pod { fill: #e6fffa; stroke: #319795; stroke-width: 1; }
      .arr { stroke: #2c5282; stroke-width: 1.4; fill: none; marker-end: url(#am); }
      .arr-d { stroke: #805ad5; stroke-width: 1.2; fill: none; marker-end: url(#am); stroke-dasharray: 5 4; }
      .arr-bi { stroke: #6b46c1; stroke-width: 1.8; fill: none; marker-end: url(#am2); marker-start: url(#am3); }
    ]]></style>
    <marker id="am" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto">
      <polygon points="0 0, 7 3.5, 0 7" fill="#2c5282"/>
    </marker>
    <marker id="am2" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto">
      <polygon points="0 0, 7 3.5, 0 7" fill="#6b46c1"/>
    </marker>
    <marker id="am3" markerWidth="7" markerHeight="7" refX="1" refY="3.5" orient="auto">
      <polygon points="7 0, 0 3.5, 7 7" fill="#6b46c1"/>
    </marker>
  </defs>
  <rect width="100%" height="100%" fill="#ffffff"/>
  <text x="480" y="26" text-anchor="middle" class="title">Fig.5 Kubernetes control plane, data plane, and main information flow (schematic)</text>

  <!-- Clients to API -->
  <rect x="100" y="46" width="110" height="38" class="box" rx="3"/>
  <text x="155" y="70" text-anchor="middle" class="txt">kubectl / client</text>
  <line x1="210" y1="65" x2="392" y2="65" class="arr"/>
  <text x="292" y="54" text-anchor="middle" class="small">1 create / update</text>
  <rect x="392" y="42" width="176" height="46" class="box-api" rx="4"/>
  <text x="480" y="70" text-anchor="middle" class="h1">kube-apiserver</text>

  <!-- etcd -->
  <rect x="610" y="42" width="110" height="46" class="box-etcd" rx="4"/>
  <text x="665" y="72" text-anchor="middle" class="h1">etcd</text>
  <line x1="568" y1="65" x2="608" y2="65" class="arr-bi"/>
  <text x="586" y="38" text-anchor="middle" class="small">2 persist / watch</text>

  <!-- Scheduler -->
  <rect x="250" y="118" width="140" height="48" class="box-cp" rx="3"/>
  <text x="320" y="140" text-anchor="middle" class="h1">kube-scheduler</text>
  <text x="320" y="156" text-anchor="middle" class="small">bind Pod to Node</text>
  <line x1="440" y1="88" x2="360" y2="118" class="arr"/>
  <line x1="360" y1="166" x2="430" y2="92" class="arr-d"/>
  <text x="285" y="108" text-anchor="middle" class="small">4 schedule</text>

  <!-- Controller Manager -->
  <rect x="530" y="118" width="200" height="48" class="box-cp" rx="3"/>
  <text x="630" y="140" text-anchor="middle" class="h1">kube-controller-manager</text>
  <text x="630" y="156" text-anchor="middle" class="small">ReplicaSet, Job, Node, ...</text>
  <line x1="520" y1="88" x2="580" y2="118" class="arr"/>
  <line x1="580" y1="166" x2="500" y2="92" class="arr-d"/>
  <text x="560" y="108" text-anchor="middle" class="small">3 reconcile</text>

  <!-- API to worker nodes: only two arrows -->
  <text x="480" y="200" text-anchor="middle" class="h1">Worker nodes (data plane)</text>
  <line x1="450" y1="88" x2="220" y2="226" class="arr"/>
  <line x1="510" y1="88" x2="740" y2="226" class="arr"/>
  <text x="300" y="188" text-anchor="middle" class="small">watch / assign</text>
  <text x="660" y="188" text-anchor="middle" class="small">5 status</text>

  <!-- Node 1 -->
  <rect x="70" y="218" width="300" height="208" class="box-node" rx="4"/>
  <text x="220" y="242" text-anchor="middle" class="h1">Node 1</text>
  <rect x="95" y="252" width="105" height="34" class="box" rx="2"/>
  <text x="147" y="272" text-anchor="middle" class="txt">kubelet</text>
  <rect x="220" y="252" width="105" height="34" class="box" rx="2"/>
  <text x="272" y="272" text-anchor="middle" class="txt">kube-proxy</text>
  <rect x="95" y="296" width="230" height="30" class="box" rx="2"/>
  <text x="210" y="314" text-anchor="middle" class="txt">container runtime (containerd / CRI-O)</text>
  <rect x="95" y="338" width="95" height="38" class="box-pod" rx="2"/>
  <text x="142" y="360" text-anchor="middle" class="txt">Pod</text>
  <rect x="205" y="338" width="95" height="38" class="box-pod" rx="2"/>
  <text x="252" y="360" text-anchor="middle" class="txt">Pod</text>
  <text x="220" y="408" text-anchor="middle" class="small">containers from image</text>

  <!-- Node 2 -->
  <rect x="590" y="218" width="300" height="208" class="box-node" rx="4"/>
  <text x="740" y="242" text-anchor="middle" class="h1">Node 2</text>
  <rect x="615" y="252" width="105" height="34" class="box" rx="2"/>
  <text x="667" y="272" text-anchor="middle" class="txt">kubelet</text>
  <rect x="740" y="252" width="105" height="34" class="box" rx="2"/>
  <text x="792" y="272" text-anchor="middle" class="txt">kube-proxy</text>
  <rect x="615" y="296" width="230" height="30" class="box" rx="2"/>
  <text x="730" y="314" text-anchor="middle" class="txt">container runtime</text>
  <rect x="655" y="338" width="170" height="38" class="box-pod" rx="2"/>
  <text x="740" y="360" text-anchor="middle" class="txt">Pod</text>

  <!-- Legend -->
  <rect x="55" y="448" width="850" height="240" fill="#fafafa" stroke="#cbd5e0" stroke-width="1" rx="4"/>
  <text x="480" y="474" text-anchor="middle" class="h1">Numbered flow 1-5 (same as article step table)</text>
  <text x="70" y="500" class="leg">1. Client submits manifests (Deployment, Job, ...) to kube-apiserver.</text>
  <text x="70" y="520" class="leg">2. apiserver persists state to etcd; other components read/write cluster state through apiserver (not shown: auth, admission).</text>
  <text x="70" y="540" class="leg">3. controller-manager runs control loops (e.g. ReplicaSet creates Pods to match desired replicas).</text>
  <text x="70" y="560" class="leg">4. scheduler assigns each unscheduled Pod to a Node (filter, score, bind nodeName).</text>
  <text x="70" y="580" class="leg">5. kubelet on that Node drives the runtime to start containers; Pod status flows back through apiserver to etcd.</text>
  <text x="70" y="608" class="txt">kube-proxy maintains Service-to-Pod forwarding on each node. Arrows are not exhaustive.</text>
  <text x="70" y="632" class="small">Scheduling: predicates (feasible nodes) -&gt; priorities (score) -&gt; bind; kubelet executes only Pods scheduled to its node.</text>
  <text x="70" y="656" class="small">Typical production splits control-plane and etcd for HA; single-box diagrams are for learning only.</text>
</svg>
