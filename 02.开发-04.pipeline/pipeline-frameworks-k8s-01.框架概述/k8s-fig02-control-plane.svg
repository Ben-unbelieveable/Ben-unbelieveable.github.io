<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="820" height="300" viewBox="0 0 820 300">
  <defs>
    <style type="text/css"><![CDATA[
      .title { font: bold 14px Arial, Helvetica, sans-serif; fill: #1a202c; }
      .lbl { font: 12px Arial, Helvetica, sans-serif; fill: #2d3748; }
      .cap { font: 11px Arial, Helvetica, sans-serif; fill: #718096; }
      .cp { fill: #edf2f7; stroke: #4a5568; stroke-width: 1.2; }
      .wn { fill: #ebf8ff; stroke: #2b6cb0; stroke-width: 1.2; }
      .arr { stroke: #2c5282; stroke-width: 1.4; fill: none; marker-end: url(#mh); }
    ]]></style>
    <marker id="mh" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <polygon points="0 0, 8 4, 0 8" fill="#2c5282"/>
    </marker>
  </defs>
  <rect width="100%" height="100%" fill="#ffffff"/>
  <text x="410" y="24" text-anchor="middle" class="title">Fig.2 Control plane and worker nodes (minimal schematic)</text>
  <text x="410" y="44" text-anchor="middle" class="cap">Scheduler assigns Pods; controllers reconcile state</text>
  <rect x="180" y="70" width="460" height="88" class="cp" rx="4"/>
  <text x="410" y="92" text-anchor="middle" class="lbl" font-weight="bold">Control plane</text>
  <rect x="210" y="104" width="100" height="40" rx="3" fill="#fff" stroke="#718096"/>
  <text x="260" y="128" text-anchor="middle" class="lbl">API Server</text>
  <rect x="340" y="104" width="100" height="40" rx="3" fill="#fff" stroke="#718096"/>
  <text x="390" y="128" text-anchor="middle" class="lbl">Scheduler</text>
  <rect x="470" y="104" width="100" height="40" rx="3" fill="#fff" stroke="#718096"/>
  <text x="520" y="128" text-anchor="middle" class="lbl">Controller</text>
  <line x1="310" y1="124" x2="338" y2="124" class="arr"/>
  <line x1="440" y1="124" x2="468" y2="124" class="arr"/>
  <line x1="390" y1="158" x2="390" y2="178" class="arr"/>
  <rect x="120" y="188" width="260" height="92" class="wn" rx="4"/>
  <text x="250" y="210" text-anchor="middle" class="lbl" font-weight="bold">Worker node 1</text>
  <text x="250" y="230" text-anchor="middle" class="cap">kubelet</text>
  <rect x="180" y="238" width="140" height="34" rx="3" fill="#fff" stroke="#2b6cb0"/>
  <text x="250" y="258" text-anchor="middle" class="lbl">Pod</text>
  <rect x="440" y="188" width="260" height="92" class="wn" rx="4"/>
  <text x="570" y="210" text-anchor="middle" class="lbl" font-weight="bold">Worker node 2</text>
  <text x="570" y="230" text-anchor="middle" class="cap">kubelet</text>
  <rect x="500" y="238" width="140" height="34" rx="3" fill="#fff" stroke="#2b6cb0"/>
  <text x="570" y="258" text-anchor="middle" class="lbl">Pod</text>
  <line x1="320" y1="158" x2="250" y2="188" class="arr"/>
  <line x1="460" y1="158" x2="570" y2="188" class="arr"/>
</svg>
