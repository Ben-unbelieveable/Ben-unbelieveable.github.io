<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="240" viewBox="0 0 800 240">
  <defs>
    <style type="text/css"><![CDATA[
      .title { font: bold 14px Arial, Helvetica, sans-serif; fill: #1a202c; }
      .lbl { font: 12px Arial, Helvetica, sans-serif; fill: #2d3748; }
      .note { font: 11px Arial, Helvetica, sans-serif; fill: #718096; }
      .box-d { fill: #fffaf0; stroke: #c05621; stroke-width: 1.3; }
      .box-a { fill: #f0fff4; stroke: #276749; stroke-width: 1.3; }
      .loop { fill: #ebf8ff; stroke: #2b6cb0; stroke-width: 1.4; }
      .arr { stroke: #2d3748; stroke-width: 1.4; fill: none; marker-end: url(#md); }
      .arr-b { stroke: #2b6cb0; stroke-width: 1.3; fill: none; marker-end: url(#mb); stroke-dasharray: 5 4; }
    ]]></style>
    <marker id="md" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <polygon points="0 0, 8 4, 0 8" fill="#2d3748"/>
    </marker>
    <marker id="mb" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <polygon points="0 0, 8 4, 0 8" fill="#2b6cb0"/>
    </marker>
  </defs>
  <rect width="100%" height="100%" fill="#ffffff"/>
  <text x="400" y="24" text-anchor="middle" class="title">Fig.3 Declarative model: desired vs actual state (schematic)</text>
  <rect x="32" y="52" width="120" height="40" rx="4" fill="#edf2f7" stroke="#4a5568"/>
  <text x="92" y="76" text-anchor="middle" class="lbl">User intent</text>
  <line x1="152" y1="72" x2="188" y2="72" class="arr"/>
  <rect x="188" y="52" width="120" height="40" class="box-d" rx="4"/>
  <text x="248" y="76" text-anchor="middle" class="lbl">Desired</text>
  <line x1="308" y1="72" x2="348" y2="72" class="arr"/>
  <rect x="348" y="48" width="104" height="48" class="loop" rx="24"/>
  <text x="400" y="76" text-anchor="middle" class="lbl">Reconcile</text>
  <line x1="452" y1="72" x2="488" y2="72" class="arr"/>
  <rect x="488" y="52" width="120" height="40" class="box-a" rx="4"/>
  <text x="548" y="76" text-anchor="middle" class="lbl">Actual</text>
  <path d="M 548 92 L 548 130 L 400 130 L 400 96" class="arr-b"/>
  <text x="400" y="150" text-anchor="middle" class="note">observe and correct</text>
  <text x="400" y="200" text-anchor="middle" class="note">Cluster converges actual state toward declared desired state</text>
</svg>
