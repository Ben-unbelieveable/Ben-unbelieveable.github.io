<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="220" viewBox="0 0 800 220">
  <defs>
    <style><![CDATA[
      .t{font:bold 14px Arial,Helvetica,sans-serif;fill:#1a202c}
      .l{font:11px Arial,Helvetica,sans-serif;fill:#2d3748}
      .b{fill:#f7fafc;stroke:#4a5568;stroke-width:1.2}
      .a{fill:#ebf8ff;stroke:#2b6cb0;stroke-width:1.5}
      .arr{stroke:#2c5282;stroke-width:1.4;fill:none;marker-end:url(#m)}
    ]]></style>
    <marker id="m" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto"><polygon points="0 0,7 3.5,0 7" fill="#2c5282"/></marker>
  </defs>
  <rect width="100%" height="100%" fill="#fff"/>
  <text x="400" y="26" text-anchor="middle" class="t">Fig.1 kubectl talks to kube-apiserver via kubeconfig</text>
  <rect x="50" y="56" width="110" height="40" class="b" rx="4"/><text x="105" y="80" text-anchor="middle" class="l">Terminal</text>
  <line x1="160" y1="76" x2="210" y2="76" class="arr"/>
  <rect x="210" y="52" width="100" height="48" class="b" rx="4"/><text x="260" y="74" text-anchor="middle" class="l">kubectl</text>
  <text x="260" y="92" text-anchor="middle" class="l" font-size="10px">REST client</text>
  <line x1="310" y1="76" x2="360" y2="76" class="arr"/>
  <rect x="360" y="52" width="140" height="48" class="b" rx="4"/><text x="430" y="74" text-anchor="middle" class="l">kubeconfig</text>
  <text x="430" y="92" text-anchor="middle" class="l" font-size="10px">cluster, user, context</text>
  <line x1="500" y1="76" x2="550" y2="76" class="arr"/>
  <text x="525" y="64" text-anchor="middle" class="l" font-size="9px">TLS + auth</text>
  <rect x="550" y="48" width="200" height="56" class="a" rx="4"/><text x="650" y="74" text-anchor="middle" class="l" font-weight="bold">kube-apiserver</text>
  <text x="650" y="94" text-anchor="middle" class="l" font-size="10px">then etcd / controllers / ...</text>
  <text x="400" y="150" text-anchor="middle" class="l">get / list / watch / create / patch / delete map to HTTP verbs on API resources</text>
  <text x="400" y="175" text-anchor="middle" class="l" font-size="10px">Imperative flags (--namespace, -f) vs declarative apply: both end as API calls</text>
</svg>
