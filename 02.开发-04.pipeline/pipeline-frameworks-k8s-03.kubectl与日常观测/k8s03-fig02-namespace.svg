<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="760" height="240" viewBox="0 0 760 240">
  <defs>
    <style><![CDATA[
      .t{font:bold 13px Arial,Helvetica,sans-serif;fill:#1a202c}
      .l{font:11px Arial,Helvetica,sans-serif;fill:#2d3748}
      .ns{fill:#edf2f7;stroke:#4a5568;stroke-width:1.2}
      .r{fill:#fff;stroke:#718096;stroke-width:1}
    ]]></style>
  </defs>
  <rect width="100%" height="100%" fill="#fff"/>
  <text x="380" y="24" text-anchor="middle" class="t">Fig.2 Namespaces partition names of resources in one cluster</text>
  <rect x="40" y="48" width="200" height="160" class="ns" rx="4"/><text x="140" y="72" text-anchor="middle" class="l" font-weight="bold">namespace: team-a</text>
  <rect x="55" y="88" width="80" height="28" class="r"/><text x="95" y="105" text-anchor="middle" class="l" font-size="10px">Pods</text>
  <rect x="55" y="124" width="80" height="28" class="r"/><text x="95" y="141" text-anchor="middle" class="l" font-size="10px">Secrets</text>
  <rect x="280" y="48" width="200" height="160" class="ns" rx="4"/><text x="380" y="72" text-anchor="middle" class="l" font-weight="bold">namespace: team-b</text>
  <rect x="295" y="88" width="80" height="28" class="r"/><text x="335" y="105" text-anchor="middle" class="l" font-size="10px">Pods</text>
  <rect x="520" y="48" width="200" height="160" class="ns" rx="4"/><text x="620" y="72" text-anchor="middle" class="l" font-weight="bold">namespace: kube-system</text>
  <text x="620" y="110" text-anchor="middle" class="l" font-size="10px">system components</text>
  <text x="380" y="210" text-anchor="middle" class="l">Same resource kind/name can coexist in different namespaces; RBAC often scoped per namespace</text>
</svg>
