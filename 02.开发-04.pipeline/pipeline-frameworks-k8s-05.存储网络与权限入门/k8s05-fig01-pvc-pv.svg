<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="260" viewBox="0 0 800 260">
  <defs>
    <style><![CDATA[
      .t{font:bold 13px Arial,Helvetica,sans-serif;fill:#1a202c}
      .l{font:11px Arial,Helvetica,sans-serif;fill:#2d3748}
      .pod{fill:#e6fffa;stroke:#319795;stroke-width:1.2}
      .pvc{fill:#fefcbf;stroke:#d69e2e;stroke-width:1.2}
      .pv{fill:#e9d8fd;stroke:#6b46c1;stroke-width:1.2}
      .arr{stroke:#2c5282;stroke-width:1.2;fill:none;marker-end:url(#m)}
    ]]></style>
    <marker id="m" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto"><polygon points="0 0,7 3.5,0 7" fill="#2c5282"/></marker>
  </defs>
  <rect width="100%" height="100%" fill="#fff"/>
  <text x="400" y="24" text-anchor="middle" class="t">Fig.1 PVC binds to PV; Pod mounts volume that references PVC</text>
  <rect x="80" y="56" width="200" height="100" class="pod" rx="4"/><text x="180" y="82" text-anchor="middle" class="l" font-weight="bold">Pod</text>
  <rect x="100" y="96" width="70" height="32" class="pvc" rx="2"/><text x="135" y="114" text-anchor="middle" class="l" font-size="10px">volumeMount</text>
  <rect x="180" y="96" width="80" height="32" class="pvc" rx="2"/><text x="220" y="114" text-anchor="middle" class="l" font-size="10px">PVC claim</text>
  <line x1="260" y1="112" x2="320" y2="112" class="arr"/>
  <text x="290" y="100" text-anchor="middle" class="l" font-size="9px">bind</text>
  <rect x="320" y="88" width="120" height="48" class="pvc" rx="4"/><text x="380" y="108" text-anchor="middle" class="l">PVC object</text>
  <text x="380" y="128" text-anchor="middle" class="l" font-size="10px">user request</text>
  <line x1="440" y1="112" x2="500" y2="112" class="arr"/>
  <rect x="500" y="88" width="120" height="48" class="pv" rx="4"/><text x="560" y="108" text-anchor="middle" class="l">PV</text>
  <text x="560" y="128" text-anchor="middle" class="l" font-size="10px">actual storage</text>
  <text x="400" y="190" text-anchor="middle" class="l">StorageClass + provisioner can create PV dynamically when PVC is created</text>
  <text x="400" y="220" text-anchor="middle" class="l" font-size="10px">ReadWriteOnce vs ReadWriteMany: depends on backend (NFS, block, ...)</text>
</svg>
