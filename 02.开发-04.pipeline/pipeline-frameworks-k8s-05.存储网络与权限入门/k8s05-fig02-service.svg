<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="780" height="240" viewBox="0 0 780 240">
  <defs>
    <style><![CDATA[
      .t{font:bold 13px Arial,Helvetica,sans-serif;fill:#1a202c}
      .l{font:11px Arial,Helvetica,sans-serif;fill:#2d3748}
      .svc{fill:#ebf8ff;stroke:#2b6cb0;stroke-width:1.3}
      .pod{fill:#e6fffa;stroke:#319795;stroke-width:1}
      .arr{stroke:#2c5282;stroke-width:1.2;fill:none;marker-end:url(#m)}
    ]]></style>
    <marker id="m" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto"><polygon points="0 0,7 3.5,0 7" fill="#2c5282"/></marker>
  </defs>
  <rect width="100%" height="100%" fill="#fff"/>
  <text x="390" y="24" text-anchor="middle" class="t">Fig.2 Service stable VIP/DNS targets Pod endpoints (kube-proxy on each node)</text>
  <rect x="260" y="52" width="260" height="56" class="svc" rx="4"/>
  <text x="390" y="76" text-anchor="middle" class="l" font-weight="bold">Service (ClusterIP example)</text>
  <text x="390" y="96" text-anchor="middle" class="l" font-size="10px">selector -&gt; Endpoints object lists Pod IPs + ports</text>
  <line x1="390" y1="108" x2="180" y2="160" class="arr"/><line x1="390" y1="108" x2="390" y2="160" class="arr"/><line x1="390" y1="108" x2="600" y2="160" class="arr"/>
  <rect x="120" y="165" width="120" height="40" class="pod" rx="3"/><text x="180" y="188" text-anchor="middle" class="l">Pod</text>
  <rect x="330" y="165" width="120" height="40" class="pod" rx="3"/><text x="390" y="188" text-anchor="middle" class="l">Pod</text>
  <rect x="540" y="165" width="120" height="40" class="pod" rx="3"/><text x="600" y="188" text-anchor="middle" class="l">Pod</text>
  <text x="390" y="225" text-anchor="middle" class="l" font-size="10px">NodePort / LoadBalancer extend reachability; Ingress routes HTTP by host/path (often needs Ingress controller)</text>
