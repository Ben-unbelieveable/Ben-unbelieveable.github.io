<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="760" height="220" viewBox="0 0 760 220">
  <defs>
    <style><![CDATA[
      .t{font:bold 13px Arial,Helvetica,sans-serif;fill:#1a202c}
      .l{font:11px Arial,Helvetica,sans-serif;fill:#2d3748}
      .b{fill:#edf2f7;stroke:#4a5568;stroke-width:1.2}
      .r{fill:#fefcbf;stroke:#d69e2e;stroke-width:1.2}
      .arr{stroke:#2c5282;stroke-width:1.2;fill:none;marker-end:url(#m)}
    ]]></style>
    <marker id="m" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto"><polygon points="0 0,7 3.5,0 7" fill="#2c5282"/></marker>
  </defs>
  <rect width="100%" height="100%" fill="#fff"/>
  <text x="380" y="24" text-anchor="middle" class="t">Fig.3 RBAC: bind Subject to Role; Role lists allowed verbs on resources</text>
  <rect x="50" y="56" width="120" height="44" class="b" rx="4"/><text x="110" y="82" text-anchor="middle" class="l">User / Group</text>
  <rect x="210" y="56" width="120" height="44" class="b" rx="4"/><text x="270" y="82" text-anchor="middle" class="l">ServiceAccount</text>
  <line x1="170" y1="78" x2="280" y2="78" class="arr" stroke-dasharray="3 3"/>
  <text x="220" y="70" text-anchor="middle" class="l" font-size="9px">or</text>
  <line x1="330" y1="78" x2="400" y2="78" class="arr"/>
  <rect x="400" y="52" width="140" height="52" class="r" rx="4"/><text x="470" y="76" text-anchor="middle" class="l">RoleBinding</text>
  <text x="470" y="94" text-anchor="middle" class="l" font-size="10px">namespaced</text>
  <line x1="540" y1="78" x2="600" y2="78" class="arr"/>
  <rect x="600" y="52" width="120" height="52" class="b" rx="4"/><text x="660" y="82" text-anchor="middle" class="l">Role</text>
  <text x="380" y="140" text-anchor="middle" class="l">Role: verbs (get,list,watch,create,...) on resources (pods, jobs, ...)</text>
  <text x="380" y="168" text-anchor="middle" class="l" font-size="10px">ClusterRole + ClusterRoleBinding for cluster-scoped or all namespaces</text>
  <text x="380" y="198" text-anchor="middle" class="l" font-size="10px">Pod uses ServiceAccount token to call API when in-cluster clients need it</text>
</svg>
