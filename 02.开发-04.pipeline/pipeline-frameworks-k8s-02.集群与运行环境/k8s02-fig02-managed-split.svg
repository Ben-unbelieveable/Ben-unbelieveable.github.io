<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="820" height="260" viewBox="0 0 820 260">
  <defs>
    <style><![CDATA[
      .t{font:bold 13px Arial,Helvetica,sans-serif;fill:#1a202c}
      .l{font:11px Arial,Helvetica,sans-serif;fill:#2d3748}
      .u{fill:#fff5f5;stroke:#c53030;stroke-width:1.2}
      .p{fill:#ebf8ff;stroke:#2b6cb0;stroke-width:1.2}
    ]]></style>
  </defs>
  <rect width="100%" height="100%" fill="#fff"/>
  <text x="410" y="24" text-anchor="middle" class="t">Fig.2 Managed K8s: responsibility split (conceptual)</text>
  <rect x="40" y="48" width="340" height="180" class="u" rx="6"/>
  <text x="210" y="72" text-anchor="middle" class="t" font-size="12px">Typically you still manage</text>
  <text x="60" y="100" class="l">- Workloads: Deployments, Jobs, ConfigMaps, Secrets</text>
  <text x="60" y="122" class="l">- Add-ons: Ingress controller, CSI driver choice (often)</text>
  <text x="60" y="144" class="l">- RBAC, network policies (policy-as-code)</text>
  <text x="60" y="166" class="l">- Node pool sizing, upgrades coordination</text>
  <rect x="440" y="48" width="340" height="180" class="p" rx="6"/>
  <text x="610" y="72" text-anchor="middle" class="t" font-size="12px">Provider often operates</text>
  <text x="460" y="100" class="l">- Control plane HA, etcd backups</text>
  <text x="460" y="122" class="l">- API server endpoint, certificates rotation</text>
  <text x="460" y="144" class="l">- Underlying control-plane nodes (not your SSH)</text>
  <text x="410" y="238" text-anchor="middle" class="l" font-size="10px">Exact split varies by vendor tier; always read the shared responsibility model doc.</text>
</svg>
