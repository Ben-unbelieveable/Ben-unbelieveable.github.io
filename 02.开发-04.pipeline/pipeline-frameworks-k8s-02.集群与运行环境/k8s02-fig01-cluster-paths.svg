<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" height="320" viewBox="0 0 880 320">
  <defs>
    <style><![CDATA[
      .t{font:bold 14px Arial,Helvetica,sans-serif;fill:#1a202c}
      .l{font:11px Arial,Helvetica,sans-serif;fill:#2d3748}
      .s{font:10px Arial,Helvetica,sans-serif;fill:#4a5568}
      .b{fill:#f7fafc;stroke:#2c5282;stroke-width:1.2}
      .h{fill:#ebf8ff;stroke:#2b6cb0;stroke-width:1.3}
      .arr{stroke:#2c5282;stroke-width:1.3;fill:none;marker-end:url(#m)}
    ]]></style>
    <marker id="m" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto"><polygon points="0 0,7 3.5,0 7" fill="#2c5282"/></marker>
  </defs>
  <rect width="100%" height="100%" fill="#fff"/>
  <text x="440" y="26" text-anchor="middle" class="t">Fig.1 Ways to obtain a Kubernetes cluster (schematic)</text>
  <rect x="40" y="52" width="140" height="44" class="b" rx="4"/><text x="110" y="78" text-anchor="middle" class="l">You (learner / ops)</text>
  <line x1="180" y1="74" x2="240" y2="74" class="arr"/>
  <text x="210" y="64" text-anchor="middle" class="s">choose path</text>
  <rect x="240" y="48" width="600" height="230" fill="none" stroke="#cbd5e0" stroke-dasharray="5 4" rx="6"/>
  <text x="260" y="72" class="l" font-weight="bold">Path A: local / learning</text>
  <rect x="260" y="88" width="170" height="56" class="h" rx="4"/>
  <text x="345" y="110" text-anchor="middle" class="l">kind / minikube</text>
  <text x="345" y="128" text-anchor="middle" class="s">K8s in Docker/VM, single or multi node</text>
  <rect x="455" y="88" width="170" height="56" class="h" rx="4"/>
  <text x="540" y="110" text-anchor="middle" class="l">k3s / k0s (lightweight)</text>
  <text x="540" y="128" text-anchor="middle" class="s">smaller footprint, edge / lab</text>
  <text x="260" y="168" class="l" font-weight="bold">Path B: self-managed cluster</text>
  <rect x="260" y="178" width="360" height="48" class="b" rx="4"/>
  <text x="440" y="206" text-anchor="middle" class="l">kubeadm + OS on bare metal / VMs (you run control plane)</text>
  <text x="260" y="248" class="l" font-weight="bold">Path C: managed Kubernetes</text>
  <rect x="260" y="258" width="360" height="48" class="b" rx="4"/>
  <text x="440" y="286" text-anchor="middle" class="l">Cloud: control plane operated by provider; you attach worker node pools</text>
</svg>
