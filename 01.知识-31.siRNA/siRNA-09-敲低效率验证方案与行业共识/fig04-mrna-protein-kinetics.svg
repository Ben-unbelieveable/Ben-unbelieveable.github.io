<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 300" font-family="Segoe UI, 'Microsoft YaHei', sans-serif">
  <defs>
    <linearGradient id="mrna" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#63b3ed"/><stop offset="100%" stop-color="#2b6cb0"/>
    </linearGradient>
    <linearGradient id="prot" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#9ae6b4"/><stop offset="100%" stop-color="#276749"/>
    </linearGradient>
  </defs>
  <rect width="760" height="300" fill="#fafafa"/>
  <text x="380" y="26" text-anchor="middle" font-size="15" fill="#1a202c" font-weight="600">图 4　转染后 mRNA 与蛋白敲低读出的典型时间滞后</text>
  <text x="380" y="44" text-anchor="middle" font-size="10" fill="#718096">曲线为示意；蛋白半衰期长时 Western 峰值可晚至 96–120 h</text>
  <line x1="60" y1="240" x2="700" y2="240" stroke="#4a5568" stroke-width="1.5"/>
  <line x1="60" y1="240" x2="60" y2="70" stroke="#4a5568" stroke-width="1.5"/>
  <text x="380" y="268" text-anchor="middle" font-size="10" fill="#4a5568">转染后时间（h）</text>
  <text x="120" y="255" font-size="9" fill="#718096">0</text>
  <text x="220" y="255" font-size="9" fill="#718096">24</text>
  <text x="340" y="255" font-size="9" fill="#718096">48</text>
  <text x="460" y="255" font-size="9" fill="#718096">72</text>
  <text x="580" y="255" font-size="9" fill="#718096">96</text>
  <text x="35" y="150" text-anchor="middle" font-size="9" fill="#718096" transform="rotate(-90 35 150)">相对丰度（%）</text>
  <text x="55" y="85" font-size="8" fill="#718096">100</text>
  <text x="55" y="240" font-size="8" fill="#718096">0</text>
  <!-- mRNA curve drops fast -->
  <path d="M 120 90 Q 180 95 220 130 Q 280 175 340 195 Q 400 205 580 210" fill="none" stroke="url(#mrna)" stroke-width="3.5"/>
  <text x="600" y="215" font-size="10" fill="#2b6cb0" font-weight="600">mRNA（qPCR）</text>
  <!-- protein curve lags -->
  <path d="M 120 88 Q 200 90 280 100 Q 360 130 460 170 Q 520 195 580 205" fill="none" stroke="url(#prot)" stroke-width="3.5" stroke-dasharray="8 4"/>
  <text x="600" y="195" font-size="10" fill="#276749" font-weight="600">蛋白（Western）</text>
  <!-- annotation boxes -->
  <rect x="250" y="55" width="200" height="52" fill="#fff" stroke="#e2e8f0" rx="4"/>
  <text x="262" y="72" font-size="9" fill="#2b6cb0">mRNA 最低点常见：48–72 h</text>
  <text x="262" y="88" font-size="9" fill="#276749">蛋白最低点：72 h 后或更晚</text>
  <text x="262" y="102" font-size="8" fill="#718096">取样过早 → 高估「敲低失败」</text>
  <line x1="340" y1="107" x2="340" y2="195" stroke="#cbd5e0" stroke-width="1" stroke-dasharray="3 3"/>
</svg>