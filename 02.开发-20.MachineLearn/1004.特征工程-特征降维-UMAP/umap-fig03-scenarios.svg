<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 520" font-family="PingFang SC, Microsoft YaHei, sans-serif">
  <rect width="920" height="520" fill="#fafbfc"/>
  <text x="460" y="36" text-anchor="middle" font-size="22" font-weight="bold" fill="#1a365d">图 3　UMAP 适用场景（科普示意）</text>
  <rect x="30" y="60" width="410" height="200" rx="12" fill="#e8f5e9" stroke="#43a047" stroke-width="2"/>
  <text x="235" y="90" text-anchor="middle" font-size="16" font-weight="bold" fill="#2e7d32">① 大规模单细胞图谱</text>
  <text x="235" y="240" text-anchor="middle" font-size="12">十万~百万细胞，速度优于t-SNE</text>
  <rect x="480" y="60" width="410" height="200" rx="12" fill="#e3f2fd" stroke="#1e88e5" stroke-width="2"/>
  <text x="685" y="90" text-anchor="middle" font-size="16" font-weight="bold" fill="#1565c0">② 蛋白结构/序列宇宙</text>
  <text x="685" y="240" text-anchor="middle" font-size="12">ESM Atlas等，保留簇间拓扑</text>
  <rect x="30" y="280" width="410" height="200" rx="12" fill="#fff3e0" stroke="#fb8c00" stroke-width="2"/>
  <text x="235" y="310" text-anchor="middle" font-size="16" font-weight="bold" fill="#e65100">③ 酶变体嵌入探索</text>
  <text x="235" y="450" text-anchor="middle" font-size="12">优先用于蛋白工程表征初筛</text>
  <rect x="480" y="280" width="410" height="200" rx="12" fill="#fce4ec" stroke="#e91e63" stroke-width="2"/>
  <text x="685" y="310" text-anchor="middle" font-size="16" font-weight="bold" fill="#ad1457">④ 连续轨迹/发育过程</text>
  <text x="685" y="450" text-anchor="middle" font-size="12">比t-SNE更好保留全局连续结构</text>
</svg>
