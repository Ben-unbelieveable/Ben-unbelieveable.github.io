<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 480" font-family="PingFang SC, Microsoft YaHei, sans-serif">
  <rect width="920" height="480" fill="#fafbfc"/>
  <text x="460" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a365d">图 2　UMAP 算法原理（科普示意）</text>
  <rect x="40" y="60" width="380" height="160" rx="10" fill="#e8eaf6" stroke="#5c6bc0" stroke-width="2"/>
  <text x="230" y="88" text-anchor="middle" font-size="14" font-weight="bold">步骤1：高维流形+k近邻图</text>
  <text x="230" y="200" text-anchor="middle" font-size="11">模糊单纯集，边权=局部相似度</text>
  <rect x="500" y="60" width="380" height="160" rx="10" fill="#e0f2f1" stroke="#00897b" stroke-width="2"/>
  <text x="690" y="88" text-anchor="middle" font-size="14" font-weight="bold">步骤2：低维交叉熵对齐</text>
  <text x="690" y="200" text-anchor="middle" font-size="11">该连的边仍连，拓扑结构保留</text>
  <text x="460" y="145" font-size="28">→</text>
  <rect x="120" y="250" width="680" height="90" rx="10" fill="#fffde7" stroke="#fbc02d"/>
  <text x="460" y="300" text-anchor="middle" font-size="12">低维图Q的拓扑 ≈ 高维图P的拓扑</text>
</svg>
