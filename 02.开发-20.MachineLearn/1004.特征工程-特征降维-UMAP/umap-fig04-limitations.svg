<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 520" font-family="PingFang SC, Microsoft YaHei, sans-serif">
  <rect width="920" height="520" fill="#fff8f0"/>
  <text x="460" y="36" text-anchor="middle" font-size="22" font-weight="bold" fill="#b71c1c">图 4　UMAP 局限性（科普示意）</text>
  <rect x="30" y="60" width="410" height="200" rx="12" fill="#ffebee" stroke="#e53935" stroke-width="2"/>
  <text x="235" y="92" text-anchor="middle" font-size="15" font-weight="bold" fill="#c62828">① 超参仍影响结果</text>
  <text x="235" y="230" text-anchor="middle" font-size="12">n_neighbors/min_dist需调参</text>
  <rect x="480" y="60" width="410" height="200" rx="12" fill="#ffebee" stroke="#e53935" stroke-width="2"/>
  <text x="685" y="92" text-anchor="middle" font-size="15" font-weight="bold" fill="#c62828">② 小样本噪声大</text>
  <text x="685" y="230" text-anchor="middle" font-size="12">N&lt;30时不宜过度解读</text>
  <rect x="30" y="280" width="410" height="200" rx="12" fill="#ffebee" stroke="#e53935" stroke-width="2"/>
  <text x="235" y="312" text-anchor="middle" font-size="15" font-weight="bold" fill="#c62828">③ 不宜作训练特征</text>
  <text x="235" y="450" text-anchor="middle" font-size="12">低维坐标语义不稳定</text>
  <rect x="480" y="280" width="410" height="200" rx="12" fill="#ffebee" stroke="#e53935" stroke-width="2"/>
  <text x="685" y="312" text-anchor="middle" font-size="15" font-weight="bold" fill="#c62828">④ fit泄漏风险</text>
  <text x="685" y="450" text-anchor="middle" font-size="12">全量fit_transform与建模流水线需区分</text>
</svg>
