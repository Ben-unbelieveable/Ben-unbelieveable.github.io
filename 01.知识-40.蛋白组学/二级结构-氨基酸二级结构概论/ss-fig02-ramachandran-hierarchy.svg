<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="860" height="380" viewBox="0 0 860 380">
  <defs>
    <style type="text/css"><![CDATA[
      .title { font: bold 15px Arial, Helvetica, sans-serif; fill: #1a202c; }
      .lbl { font: 12px Arial, Helvetica, sans-serif; fill: #2d3748; }
      .cap { font: 10px Arial, Helvetica, sans-serif; fill: #718096; }
      .axis { stroke: #4a5568; stroke-width: 1.2; }
      .tick { stroke: #cbd5e0; stroke-width: 0.8; }
      .region-a { fill: #fed7d7; stroke: #c53030; stroke-width: 1; opacity: 0.85; }
      .region-b { fill: #bee3f8; stroke: #2b6cb0; stroke-width: 1; opacity: 0.85; }
      .region-l { fill: #e2e8f0; stroke: #718096; stroke-width: 1; opacity: 0.75; }
      .region-p { fill: #faf089; stroke: #d69e2e; stroke-width: 1; opacity: 0.85; }
      .box { fill: #f7fafc; stroke: #4a5568; stroke-width: 1.2; }
    ]]></style>
  </defs>
  <rect width="100%" height="100%" fill="#ffffff"/>
  <text x="430" y="28" text-anchor="middle" class="title">Fig.2 Ramachandran plot and structure hierarchy</text>
  <text x="430" y="48" text-anchor="middle" class="cap">allowed (phi, psi) regions map to secondary structure types</text>

  <!-- Ramachandran plot -->
  <rect x="40" y="68" width="360" height="280" class="box" rx="6"/>
  <line x1="80" y1="308" x2="360" y2="308" class="axis"/>
  <line x1="80" y1="308" x2="80" y2="88" class="axis"/>
  <text x="220" y="340" text-anchor="middle" class="lbl">phi (deg)</text>
  <text x="52" y="198" text-anchor="middle" class="lbl" transform="rotate(-90 52 198)">psi (deg)</text>
  <text x="80" y="322" class="cap">-180</text>
  <text x="220" y="322" text-anchor="middle" class="cap">0</text>
  <text x="350" y="322" text-anchor="end" class="cap">180</text>
  <text x="68" y="308" text-anchor="end" class="cap">-180</text>
  <text x="68" y="198" text-anchor="end" class="cap">0</text>
  <text x="68" y="98" text-anchor="end" class="cap">180</text>
  <ellipse cx="145" cy="235" rx="42" ry="28" class="region-a"/>
  <text x="145" y="240" text-anchor="middle" class="lbl" font-size="11">alpha</text>
  <polygon class="region-b" points="250,120 320,95 335,170 270,195"/>
  <text x="295" y="145" text-anchor="middle" class="lbl" font-size="11">beta</text>
  <ellipse cx="210" cy="120" rx="35" ry="22" class="region-l"/>
  <text x="210" y="125" text-anchor="middle" class="lbl" font-size="11">left alpha</text>
  <ellipse cx="120" cy="130" rx="28" ry="20" class="region-p"/>
  <text x="120" y="135" text-anchor="middle" class="lbl" font-size="10">PPII</text>

  <!-- hierarchy -->
  <rect x="430" y="68" width="390" height="280" class="box" rx="6"/>
  <text x="625" y="96" text-anchor="middle" class="lbl" font-weight="bold">Protein structure hierarchy</text>
  <rect x="560" y="118" width="120" height="36" fill="#fff5f5" stroke="#c53030" rx="4"/>
  <text x="620" y="140" text-anchor="middle" class="lbl">Primary (1 deg)</text>
  <text x="620" y="168" text-anchor="middle" class="cap">amino acid sequence</text>
  <line x1="620" y1="154" x2="620" y2="178" stroke="#4a5568" stroke-width="1.2"/>
  <rect x="560" y="182" width="120" height="36" fill="#ebf8ff" stroke="#2b6cb0" rx="4"/>
  <text x="620" y="204" text-anchor="middle" class="lbl" font-weight="bold">Secondary (2 deg)</text>
  <text x="620" y="232" text-anchor="middle" class="cap">local H-bond patterns</text>
  <line x1="620" y1="218" x2="620" y2="242" stroke="#4a5568" stroke-width="1.2"/>
  <rect x="560" y="246" width="120" height="36" fill="#f0fff4" stroke="#276749" rx="4"/>
  <text x="620" y="268" text-anchor="middle" class="lbl">Tertiary (3 deg)</text>
  <text x="620" y="296" text-anchor="middle" class="cap">3D fold of one chain</text>
  <line x1="620" y1="282" x2="620" y2="306" stroke="#4a5568" stroke-width="1.2"/>
  <rect x="560" y="310" width="120" height="28" fill="#faf5ff" stroke="#6b46c1" rx="4"/>
  <text x="620" y="328" text-anchor="middle" class="lbl" font-size="11">Quaternary (4 deg)</text>
  <text x="470" y="210" class="lbl">Helix, sheet, turn, loop</text>
  <text x="470" y="230" class="cap">defined within ~5-10 aa</text>
  <text x="470" y="260" class="lbl">Pack into domain / fold</text>
  <text x="470" y="280" class="cap">hydrophobic core, contacts</text>
</svg>
