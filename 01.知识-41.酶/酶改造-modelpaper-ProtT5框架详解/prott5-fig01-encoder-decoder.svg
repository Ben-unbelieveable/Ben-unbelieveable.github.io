<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" height="360" viewBox="0 0 880 360">
  <defs>
    <style type="text/css"><![CDATA[
      .t { font: bold 14px "Segoe UI", Arial, sans-serif; fill: #1a202c; }
      .s { font: 11px "Segoe UI", Arial, sans-serif; fill: #4a5568; }
      .b { font: 12px "Segoe UI", Arial, sans-serif; fill: #2d3748; }
      .enc { fill: #ebf8ff; stroke: #2b6cb0; stroke-width: 1.2; }
      .dec { fill: #fff5f5; stroke: #c53030; stroke-width: 1.2; }
      .arr { stroke: #2c5282; stroke-width: 1.3; fill: none; marker-end: url(#ma); }
      .dash { stroke: #718096; stroke-width: 1.2; fill: none; stroke-dasharray: 4 3; }
    ]]></style>
    <marker id="ma" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <polygon points="0 0, 8 4, 0 8" fill="#2c5282"/>
    </marker>
  </defs>
  <rect width="100%" height="100%" fill="#ffffff"/>
  <text x="440" y="26" text-anchor="middle" class="t">Fig.1 T5 / ProtT5 encoder-decoder scaffold (conceptual)</text>
  <text x="440" y="44" text-anchor="middle" class="s">ProtT5-XL: 24 encoder layers + 24 decoder layers, d_model=1024, max length 512 (HF config)</text>

  <rect x="40" y="72" width="260" height="200" class="enc" rx="6"/>
  <text x="170" y="98" text-anchor="middle" class="b" font-weight="600">Encoder (24 blocks)</text>
  <text x="170" y="118" text-anchor="middle" class="s">Self-attention (bidirectional)</text>
  <text x="170" y="136" text-anchor="middle" class="s">+ FFN + residual + LayerNorm</text>
  <text x="170" y="158" text-anchor="middle" class="s">Relative position bias</text>
  <text x="170" y="186" text-anchor="middle" class="b">Input: protein tokens</text>
  <text x="170" y="204" text-anchor="middle" class="s">(space-separated AA, max 512)</text>
  <text x="170" y="232" text-anchor="middle" class="b">Output: hidden states H</text>
  <text x="170" y="250" text-anchor="middle" class="s">per-residue 1024-d</text>

  <line x1="300" y1="172" x2="338" y2="172" class="arr"/>
  <text x="319" y="164" text-anchor="middle" class="s" fill="#2c5282">cross-attn</text>

  <rect x="340" y="72" width="260" height="200" class="dec" rx="6"/>
  <text x="470" y="98" text-anchor="middle" class="b" font-weight="600">Decoder (24 blocks)</text>
  <text x="470" y="118" text-anchor="middle" class="s">Masked self-attention (causal)</text>
  <text x="470" y="136" text-anchor="middle" class="s">+ cross-attention to H</text>
  <text x="470" y="154" text-anchor="middle" class="s">+ FFN + residual + LayerNorm</text>
  <text x="470" y="186" text-anchor="middle" class="b">Output logits</text>
  <text x="470" y="204" text-anchor="middle" class="s">(vocab / seq2seq head)</text>

  <line x1="600" y1="172" x2="638" y2="172" class="arr"/>

  <rect x="640" y="100" width="200" height="144" fill="#f7fafc" stroke="#cbd5e0" stroke-width="1" rx="5"/>
  <text x="740" y="128" text-anchor="middle" class="b" font-weight="600">Pretraining (XL-UniRef50)</text>
  <text x="740" y="150" text-anchor="middle" class="s">BART-like MLM on input:</text>
  <text x="740" y="168" text-anchor="middle" class="s">~15% positions masked</text>
  <text x="740" y="190" text-anchor="middle" class="s">Not identical to original</text>
  <text x="740" y="208" text-anchor="middle" class="s">T5 span corruption recipe</text>

  <text x="440" y="318" text-anchor="middle" class="s">Downstream: use encoder last_hidden_state for embeddings; decoder mainly for seq2seq fine-tuning.</text>
</svg>
