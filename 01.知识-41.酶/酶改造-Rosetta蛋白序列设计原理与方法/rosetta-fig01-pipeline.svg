<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="860" height="300" viewBox="0 0 860 300">
  <defs>
    <style type="text/css"><![CDATA[
      .title { font: bold 15px Arial, Helvetica, sans-serif; fill: #1a202c; }
      .lbl { font: 12px Arial, Helvetica, sans-serif; fill: #2d3748; }
      .cap { font: 10px Arial, Helvetica, sans-serif; fill: #718096; }
      .box { fill: #f7fafc; stroke: #4a5568; stroke-width: 1.2; }
      .hl { fill: #ebf8ff; stroke: #2b6cb0; stroke-width: 1.3; }
      .out { fill: #f0fff4; stroke: #276749; stroke-width: 1.3; }
      .arr { stroke: #2c5282; stroke-width: 1.5; fill: none; marker-end: url(#m); }
    ]]></style>
    <marker id="m" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto">
      <polygon points="0 0, 9 4.5, 0 9" fill="#2c5282"/>
    </marker>
  </defs>
  <rect width="100%" height="100%" fill="#ffffff"/>
  <text x="430" y="26" text-anchor="middle" class="title">Fig.1 Rosetta sequence design overview</text>
  <text x="430" y="46" text-anchor="middle" class="cap">scalar score + discrete rotamer search + optional constraints</text>
  <rect x="28" y="72" width="168" height="200" class="box" rx="6"/>
  <text x="112" y="98" text-anchor="middle" class="lbl" font-weight="bold">Input</text>
  <text x="112" y="118" text-anchor="middle" class="cap">fixed / soft backbone</text>
  <path d="M 52 200 Q 80 130 112 150 T 172 165" fill="none" stroke="#4a5568" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="70" cy="175" r="5" fill="#4299e1"/>
  <circle cx="112" cy="148" r="5" fill="#4299e1"/>
  <circle cx="150" cy="158" r="5" fill="#4299e1"/>
  <text x="112" y="228" text-anchor="middle" class="lbl">Coordinates, Pose</text>
  <text x="112" y="248" text-anchor="middle" class="cap">C trace schematic</text>
  <line x1="206" y1="170" x2="248" y2="170" class="arr"/>
  <text x="227" y="162" text-anchor="middle" class="cap" font-size="9">encode</text>
  <rect x="256" y="72" width="200" height="200" class="hl" rx="6"/>
  <text x="356" y="98" text-anchor="middle" class="lbl" font-weight="bold">Score + constraints</text>
  <text x="268" y="122" class="lbl">E = sum_i w_i term_i</text>
  <text x="268" y="142" class="lbl">+ E_constraint</text>
  <rect x="268" y="158" width="176" height="28" class="box" rx="3"/>
  <text x="356" y="176" text-anchor="middle" class="lbl" font-size="11">LJ, solvation, H-bond ...</text>
  <rect x="268" y="194" width="176" height="28" class="box" rx="3"/>
  <text x="356" y="212" text-anchor="middle" class="lbl" font-size="11">distance, dihedral ...</text>
  <text x="356" y="248" text-anchor="middle" class="cap">e.g. ref2015 weights</text>
  <line x1="464" y1="170" x2="508" y2="170" class="arr"/>
  <text x="486" y="162" text-anchor="middle" class="cap" font-size="9">search</text>
  <rect x="516" y="72" width="200" height="200" class="box" rx="6"/>
  <text x="616" y="98" text-anchor="middle" class="lbl" font-weight="bold">Packer + MC / SA</text>
  <text x="528" y="124" class="lbl">identity (20 aa)</text>
  <text x="528" y="144" class="lbl">rotamer (discrete chi)</text>
  <text x="528" y="168" class="lbl">propose, deltaE, Metro</text>
  <text x="528" y="192" class="lbl">cooling schedule</text>
  <text x="616" y="248" text-anchor="middle" class="cap">discrete + minimize loop</text>
  <line x1="724" y1="170" x2="768" y2="170" class="arr"/>
  <rect x="776" y="72" width="72" height="200" class="out" rx="6"/>
  <text x="812" y="98" text-anchor="middle" class="lbl" font-weight="bold">Out</text>
  <text x="812" y="128" text-anchor="middle" class="lbl" font-size="11">seq</text>
  <text x="812" y="168" text-anchor="middle" class="lbl" font-size="11">side</text>
  <text x="812" y="208" text-anchor="middle" class="lbl" font-size="11">low E</text>
  <text x="812" y="248" text-anchor="middle" class="cap">candidates</text>
</svg>
