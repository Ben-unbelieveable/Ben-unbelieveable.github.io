<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" height="380" viewBox="0 0 880 380">
  <defs>
    <style type="text/css"><![CDATA[
      .title { font: bold 15px Arial, Helvetica, sans-serif; fill: #1a202c; }
      .lbl { font: 11px Arial, Helvetica, sans-serif; fill: #2d3748; }
      .cap { font: 9px Arial, Helvetica, sans-serif; fill: #718096; }
      .p { fill: #f7fafc; stroke: #4a5568; stroke-width: 1.2; }
      .p2 { fill: #ebf8ff; stroke: #2b6cb0; stroke-width: 1.2; }
      .p3 { fill: #f0fff4; stroke: #276749; stroke-width: 1.2; }
      .bb { fill: none; stroke: #4a5568; stroke-width: 2; stroke-linecap: round; }
      .bb2 { fill: none; stroke: #2b6cb0; stroke-width: 2; stroke-linecap: round; }
    ]]></style>
  </defs>
  <rect width="100%" height="100%" fill="#ffffff"/>
  <text x="440" y="24" text-anchor="middle" class="title">Fig.4 Protocols: fixed BB, flexible BB, multistate</text>
  <text x="440" y="42" text-anchor="middle" class="cap">backbone quality vs search cost</text>
  <rect x="20" y="58" width="260" height="300" class="p" rx="8"/>
  <text x="150" y="84" text-anchor="middle" class="lbl" font-weight="bold" font-size="12">Fixed-backbone design</text>
  <text x="150" y="104" text-anchor="middle" class="cap">fixbb / FastDesign</text>
  <path d="M 60 220 L 90 150 L 130 180 L 170 140 L 220 200" class="bb"/>
  <text x="150" y="250" text-anchor="middle" class="lbl">backbone fixed or weak</text>
  <text x="150" y="272" text-anchor="middle" class="lbl">pack sequence + rotamers</text>
  <text x="150" y="320" text-anchor="middle" class="lbl" fill="#c05621">risk if model wrong</text>
  <rect x="300" y="58" width="260" height="300" class="p2" rx="8"/>
  <text x="430" y="84" text-anchor="middle" class="lbl" font-weight="bold" font-size="12">Flexible / coupled</text>
  <text x="430" y="104" text-anchor="middle" class="cap">backrub, coupled moves, relax</text>
  <path d="M 340 210 Q 400 130 460 175 T 520 195" class="bb2"/>
  <path d="M 350 215 Q 405 125 455 170 T 515 200" class="bb" opacity="0.35"/>
  <text x="430" y="250" text-anchor="middle" class="lbl">MC moves local backbone</text>
  <text x="430" y="272" text-anchor="middle" class="lbl">fix clashes, pocket shape</text>
  <text x="430" y="320" text-anchor="middle" class="lbl" fill="#276749">larger space, more cycles</text>
  <rect x="580" y="58" width="280" height="300" class="p3" rx="8"/>
  <text x="720" y="84" text-anchor="middle" class="lbl" font-weight="bold" font-size="12">Multistate design</text>
  <text x="720" y="104" text-anchor="middle" class="cap">multiple poses, weighted E</text>
  <path d="M 620 200 L 650 155 L 700 175 L 750 160" class="bb"/>
  <text x="685" y="138" text-anchor="middle" class="cap">state A</text>
  <path d="M 630 240 L 670 220 L 720 245 L 780 230" class="bb2"/>
  <text x="720" y="268" text-anchor="middle" class="cap">state B</text>
  <text x="720" y="292" text-anchor="middle" class="lbl">objective: w1 E1 + w2 E2 + ...</text>
  <text x="720" y="314" text-anchor="middle" class="lbl">one sequence, many conformers</text>
  <text x="720" y="340" text-anchor="middle" class="lbl" fill="#276749">allostery, multi-step catalysis</text>
</svg>
