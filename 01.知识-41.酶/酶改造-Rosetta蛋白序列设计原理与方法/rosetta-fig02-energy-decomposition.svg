<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="820" height="340" viewBox="0 0 820 340">
  <defs>
    <style type="text/css"><![CDATA[
      .title { font: bold 15px Arial, Helvetica, sans-serif; fill: #1a202c; }
      .lbl { font: 12px Arial, Helvetica, sans-serif; fill: #2d3748; }
      .cap { font: 10px Arial, Helvetica, sans-serif; fill: #718096; }
      .note { font: 10px Arial, Helvetica, sans-serif; fill: #4a5568; }
      .axis { stroke: #2d3748; stroke-width: 1.2; }
    ]]></style>
    <marker id="mh" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <polygon points="0 0, 8 4, 0 8" fill="#2c5282"/>
    </marker>
  </defs>
  <rect width="100%" height="100%" fill="#ffffff"/>
  <text x="410" y="26" text-anchor="middle" class="title">Fig.2 Full-atom score (schematic): weighted sum of terms</text>
  <text x="410" y="46" text-anchor="middle" class="cap">bar lengths qualitative only (not comparable across rows)</text>
  <line x1="80" y1="280" x2="760" y2="280" class="axis"/>
  <text x="80" y="302" class="lbl">0</text>
  <text x="620" y="302" class="lbl">contribution (conceptual)</text>
  <text x="40" y="88" class="lbl" font-weight="bold">Term</text>
  <text x="200" y="88" class="lbl" font-weight="bold">Role</text>
  <text x="40" y="118" class="lbl">fa_atr / fa_rep</text>
  <rect x="200" y="102" width="180" height="20" fill="#bee3f8" stroke="#2b6cb0" stroke-width="1"/>
  <text x="390" y="117" class="lbl">vdW attraction / repulsion</text>
  <text x="40" y="152" class="lbl">fa_sol</text>
  <rect x="200" y="136" width="140" height="20" fill="#c6f6d5" stroke="#276749" stroke-width="1"/>
  <text x="350" y="151" class="lbl">implicit solvation</text>
  <text x="40" y="186" class="lbl">hbond_*</text>
  <rect x="200" y="170" width="120" height="20" fill="#feebc8" stroke="#c05621" stroke-width="1"/>
  <text x="330" y="185" class="lbl">geometry-aware H-bonds</text>
  <text x="40" y="220" class="lbl">rama / p_aa_pp</text>
  <rect x="200" y="204" width="90" height="20" fill="#e9d8fd" stroke="#6b46c1" stroke-width="1"/>
  <text x="300" y="219" class="lbl">backbone phi/psi prefs</text>
  <text x="40" y="254" class="lbl">fa_dun / ref</text>
  <rect x="200" y="238" width="100" height="20" fill="#fed7d7" stroke="#c53030" stroke-width="1"/>
  <text x="310" y="253" class="lbl">rotamer prob + reference</text>
  <rect x="560" y="108" width="220" height="120" fill="#f7fafc" stroke="#4a5568" stroke-width="1.2" rx="6"/>
  <text x="670" y="138" text-anchor="middle" class="lbl" font-weight="bold">Total score</text>
  <text x="670" y="162" text-anchor="middle" class="lbl" font-size="13">E_total</text>
  <text x="670" y="190" text-anchor="middle" class="note">rank conformers</text>
  <text x="670" y="210" text-anchor="middle" class="note">not absolute dG</text>
  <path d="M 520 178 L 552 178" stroke="#2c5282" stroke-width="1.5" fill="none" marker-end="url(#mh)"/>
  <text x="410" y="328" text-anchor="middle" class="note">Names and weights depend on scorefunction version and flags.</text>
</svg>
