<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="860" height="340" viewBox="0 0 860 340">
  <defs>
    <style type="text/css"><![CDATA[
      .title { font: bold 15px Arial, Helvetica, sans-serif; fill: #1a202c; }
      .lbl { font: 12px Arial, Helvetica, sans-serif; fill: #2d3748; }
      .cap { font: 10px Arial, Helvetica, sans-serif; fill: #718096; }
      .bar-bg { fill: #edf2f7; stroke: #cbd5e0; stroke-width: 1; }
      .grad { fill: url(#flexGrad); }
      .box { fill: #f7fafc; stroke: #4a5568; stroke-width: 1.2; }
    ]]></style>
    <linearGradient id="flexGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2b6cb0"/>
      <stop offset="50%" stop-color="#ecc94b"/>
      <stop offset="100%" stop-color="#e53e3e"/>
    </linearGradient>
  </defs>
  <rect width="100%" height="100%" fill="#ffffff"/>
  <text x="430" y="28" text-anchor="middle" class="title">Fig.3 Rigidity-flexibility spectrum of secondary structure</text>
  <text x="430" y="48" text-anchor="middle" class="cap">not binary: each element has characteristic dynamics and context-dependent mobility</text>

  <rect x="60" y="88" width="740" height="28" class="bar-bg" rx="14"/>
  <rect x="60" y="88" width="740" height="28" class="grad" rx="14" opacity="0.75"/>
  <text x="80" y="106" class="lbl" fill="#fff" font-weight="bold">rigid</text>
  <text x="780" y="106" text-anchor="end" class="lbl" fill="#fff" font-weight="bold">flexible</text>

  <!-- markers on spectrum -->
  <line x1="130" y1="72" x2="130" y2="132" stroke="#2b6cb0" stroke-width="2"/>
  <text x="130" y="152" text-anchor="middle" class="lbl">beta-core</text>
  <text x="130" y="168" text-anchor="middle" class="cap">low B-factor</text>

  <line x1="260" y1="72" x2="260" y2="132" stroke="#2b6cb0" stroke-width="2"/>
  <text x="260" y="152" text-anchor="middle" class="lbl">alpha-helix</text>
  <text x="260" y="168" text-anchor="middle" class="cap">breathing, unwind</text>

  <line x1="430" y1="72" x2="430" y2="132" stroke="#d69e2e" stroke-width="2"/>
  <text x="430" y="152" text-anchor="middle" class="lbl">turn / bend</text>
  <text x="430" y="168" text-anchor="middle" class="cap"> hinge-like</text>

  <line x1="600" y1="72" x2="600" y2="132" stroke="#e53e3e" stroke-width="2"/>
  <text x="600" y="152" text-anchor="middle" class="lbl">surface loop</text>
  <text x="600" y="168" text-anchor="middle" class="cap">ms-us motion</text>

  <line x1="740" y1="72" x2="740" y2="132" stroke="#e53e3e" stroke-width="2"/>
  <text x="740" y="152" text-anchor="middle" class="lbl">IDR / linker</text>
  <text x="740" y="168" text-anchor="middle" class="cap">ensemble</text>

  <!-- detail boxes -->
  <rect x="40" y="200" width="250" height="110" class="box" rx="6"/>
  <text x="165" y="222" text-anchor="middle" class="lbl" font-weight="bold">Relative rigidity</text>
  <text x="52" y="244" class="lbl">H-bond network density</text>
  <text x="52" y="262" class="cap">sheet &gt; helix &gt; turn &gt; loop</text>
  <text x="52" y="284" class="lbl">Packaging in hydrophobic core</text>
  <text x="52" y="300" class="cap">raises effective stiffness</text>

  <rect x="305" y="200" width="250" height="110" class="box" rx="6"/>
  <text x="430" y="222" text-anchor="middle" class="lbl" font-weight="bold">Dynamic behavior</text>
  <text x="317" y="244" class="lbl">helix: local fraying, pivot</text>
  <text x="317" y="262" class="lbl">loop: induced-fit, gating</text>
  <text x="317" y="284" class="cap">NMR: multiple conformers</text>
  <text x="317" y="300" class="cap">cryo-EM: smeared density</text>

  <rect x="570" y="200" width="250" height="110" class="box" rx="6"/>
  <text x="695" y="222" text-anchor="middle" class="lbl" font-weight="bold">Functional implication</text>
  <text x="582" y="244" class="lbl">rigid: scaffold, specificity</text>
  <text x="582" y="262" class="lbl">flexible: regulation, binding</text>
  <text x="582" y="284" class="cap">allostery via loop motion</text>
  <text x="582" y="300" class="cap">temperature / pH sensitivity</text>
</svg>
