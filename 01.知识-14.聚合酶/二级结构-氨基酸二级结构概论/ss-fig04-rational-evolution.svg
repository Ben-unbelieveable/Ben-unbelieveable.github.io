<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="900" height="360" viewBox="0 0 900 360">
  <defs>
    <style type="text/css"><![CDATA[
      .title { font: bold 15px Arial, Helvetica, sans-serif; fill: #1a202c; }
      .lbl { font: 12px Arial, Helvetica, sans-serif; fill: #2d3748; }
      .cap { font: 10px Arial, Helvetica, sans-serif; fill: #718096; }
      .box { fill: #f7fafc; stroke: #4a5568; stroke-width: 1.2; }
      .core { fill: #ebf8ff; stroke: #2b6cb0; stroke-width: 1.3; }
      .loop { fill: #fff5f5; stroke: #c53030; stroke-width: 1.3; }
      .surf { fill: #f0fff4; stroke: #276749; stroke-width: 1.3; }
      .arr { stroke: #2c5282; stroke-width: 1.5; fill: none; marker-end: url(#m); }
    ]]></style>
    <marker id="m" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto">
      <polygon points="0 0, 9 4.5, 0 9" fill="#2c5282"/>
    </marker>
  </defs>
  <rect width="100%" height="100%" fill="#ffffff"/>
  <text x="450" y="28" text-anchor="middle" class="title">Fig.4 Secondary structure in rational enzyme evolution</text>
  <text x="450" y="48" text-anchor="middle" class="cap">design constraints and mutation targets differ by structural region</text>

  <!-- protein cartoon -->
  <rect x="40" y="72" width="280" height="250" class="box" rx="6"/>
  <text x="180" y="96" text-anchor="middle" class="lbl" font-weight="bold">Structural zoning</text>
  <rect x="120" y="120" width="120" height="80" class="core" rx="4"/>
  <text x="180" y="155" text-anchor="middle" class="lbl">alpha/beta core</text>
  <text x="180" y="172" text-anchor="middle" class="cap">conserved fold</text>
  <path d="M 70 210 Q 120 190 180 200 Q 240 210 290 195" fill="none" stroke="#c53030" stroke-width="3"/>
  <text x="180" y="230" text-anchor="middle" class="lbl" fill="#c53030">active-site loop</text>
  <rect x="70" y="250" width="60" height="40" class="surf" rx="3"/>
  <rect x="230" y="250" width="60" height="40" class="surf" rx="3"/>
  <text x="180" y="278" text-anchor="middle" class="cap">surface loops / termini</text>

  <!-- workflow -->
  <rect x="360" y="72" width="500" height="250" class="box" rx="6"/>
  <text x="610" y="96" text-anchor="middle" class="lbl" font-weight="bold">Rational evolution workflow</text>
  <rect x="380" y="118" width="110" height="44" class="box" rx="4"/>
  <text x="435" y="138" text-anchor="middle" class="lbl">Structure</text>
  <text x="435" y="154" text-anchor="middle" class="cap">PDB / AF</text>
  <line x1="490" y1="140" x2="518" y2="140" class="arr"/>
  <rect x="526" y="118" width="110" height="44" class="core" rx="4"/>
  <text x="581" y="138" text-anchor="middle" class="lbl">SS assign</text>
  <text x="581" y="154" text-anchor="middle" class="cap">DSSP / PSIPRED</text>
  <line x1="636" y1="140" x2="664" y2="140" class="arr"/>
  <rect x="672" y="118" width="110" height="44" class="loop" rx="4"/>
  <text x="727" y="138" text-anchor="middle" class="lbl">Hotspot pick</text>
  <text x="727" y="154" text-anchor="middle" class="cap">loops, interface</text>
  <line x1="782" y1="140" x2="810" y2="140" class="arr"/>
  <rect x="818" y="118" width="32" height="44" class="box" rx="4"/>
  <text x="834" y="145" text-anchor="middle" class="lbl" font-size="11">Lib</text>

  <rect x="380" y="188" width="140" height="50" class="core" rx="4"/>
  <text x="450" y="210" text-anchor="middle" class="lbl">Core mutations</text>
  <text x="450" y="228" text-anchor="middle" class="cap">stability, Tm</text>
  <text x="450" y="244" text-anchor="middle" class="cap">avoid SS breakage</text>

  <rect x="540" y="188" width="140" height="50" class="loop" rx="4"/>
  <text x="610" y="210" text-anchor="middle" class="lbl">Loop mutations</text>
  <text x="610" y="228" text-anchor="middle" class="cap">activity, selectivity</text>
  <text x="610" y="244" text-anchor="middle" class="cap">induced-fit tuning</text>

  <rect x="700" y="188" width="140" height="50" class="surf" rx="4"/>
  <text x="770" y="210" text-anchor="middle" class="lbl">Surface SS</text>
  <text x="770" y="228" text-anchor="middle" class="cap">solubility, expression</text>
  <text x="770" y="244" text-anchor="middle" class="cap">aggregation risk</text>

  <line x1="450" y1="238" x2="450" y2="268" class="arr"/>
  <line x1="610" y1="238" x2="610" y2="268" class="arr"/>
  <line x1="770" y1="238" x2="770" y2="268" class="arr"/>
  <rect x="480" y="272" width="300" height="36" fill="#faf5ff" stroke="#6b46c1" rx="4"/>
  <text x="630" y="294" text-anchor="middle" class="lbl">Validate: kinetics, SS retention, MD / cryo-EM</text>
</svg>
