<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 520" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#444"/>
    </marker>
    <linearGradient id="blueBox" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8f1fb"/>
      <stop offset="100%" stop-color="#d4e6f8"/>
    </linearGradient>
    <linearGradient id="greenBox" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#eaf7ee"/>
      <stop offset="100%" stop-color="#d5f0dd"/>
    </linearGradient>
    <linearGradient id="orangeBox" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff4e8"/>
      <stop offset="100%" stop-color="#ffe8cc"/>
    </linearGradient>
  </defs>
  <rect width="920" height="520" fill="#fafafa"/>
  <text x="460" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#222">AiCE Framework Pipeline (Fei et al., Cell 2025)</text>

  <!-- Input -->
  <rect x="30" y="55" width="130" height="52" rx="6" fill="#eee" stroke="#666"/>
  <text x="95" y="78" text-anchor="middle" font-size="12" font-weight="bold">Input</text>
  <text x="95" y="96" text-anchor="middle" font-size="10">PDB / mmCIF</text>

  <!-- Inverse folding -->
  <rect x="200" y="45" width="160" height="72" rx="6" fill="url(#blueBox)" stroke="#2c6fad"/>
  <text x="280" y="68" text-anchor="middle" font-size="12" font-weight="bold">Inverse Folding</text>
  <text x="280" y="86" text-anchor="middle" font-size="10">ProteinMPNN / ESM-IF1</text>
  <text x="280" y="102" text-anchor="middle" font-size="9" fill="#555">N=1000, T=0.5</text>

  <!-- MSA -->
  <rect x="400" y="55" width="120" height="52" rx="6" fill="#eee" stroke="#666"/>
  <text x="460" y="78" text-anchor="middle" font-size="12" font-weight="bold">MSA (.fa)</text>
  <text x="460" y="96" text-anchor="middle" font-size="10">sampled seqs</text>

  <!-- AiCEsingle branch -->
  <text x="120" y="145" font-size="13" font-weight="bold" fill="#2c6fad">AiCEsingle</text>
  <line x1="95" y1="107" x2="95" y2="160" stroke="#444" marker-end="url(#arrow)"/>
  <line x1="280" y1="117" x2="460" y2="81" stroke="#444" marker-end="url(#arrow)"/>
  <line x1="460" y1="107" x2="460" y2="160" stroke="#444" marker-end="url(#arrow)"/>

  <!-- Freq count -->
  <rect x="380" y="160" width="160" height="58" rx="6" fill="url(#blueBox)" stroke="#2c6fad"/>
  <text x="460" y="182" text-anchor="middle" font-size="11" font-weight="bold">Occurrence Frequency f_i</text>
  <text x="460" y="200" text-anchor="middle" font-size="9">count_residue_freq.py</text>

  <!-- DSSP -->
  <rect x="200" y="160" width="140" height="58" rx="6" fill="url(#blueBox)" stroke="#2c6fad"/>
  <text x="270" y="182" text-anchor="middle" font-size="11" font-weight="bold">Secondary Structure</text>
  <text x="270" y="200" text-anchor="middle" font-size="9">mkdssp (DSSP) ’ H/E/C</text>
  <line x1="160" y1="81" x2="240" y2="160" stroke="#444" marker-end="url(#arrow)"/>

  <!-- Filter -->
  <rect x="320" y="250" width="280" height="68" rx="6" fill="url(#greenBox)" stroke="#2d8a4e"/>
  <text x="460" y="272" text-anchor="middle" font-size="12" font-weight="bold">Structural Constraint Filter</text>
  <text x="460" y="290" text-anchor="middle" font-size="10">SS`C: f e ˛ (0.8)  |  SS=C: f e ł (0.5)</text>
  <text x="460" y="306" text-anchor="middle" font-size="9" fill="#555">ref ` alt &amp; highest-freq AA</text>
  <line x1="270" y1="218" x2="380" y2="250" stroke="#444" marker-end="url(#arrow)"/>
  <line x1="460" y1="218" x2="460" y2="250" stroke="#444" marker-end="url(#arrow)"/>

  <!-- Single mut output -->
  <rect x="380" y="350" width="160" height="48" rx="6" fill="#eee" stroke="#666"/>
  <text x="460" y="372" text-anchor="middle" font-size="11" font-weight="bold">HF Single Mutations</text>
  <text x="460" y="388" text-anchor="middle" font-size="9">.mut / .comb</text>
  <line x1="460" y1="318" x2="460" y2="350" stroke="#444" marker-end="url(#arrow)"/>

  <!-- AiCEmulti branch -->
  <text x="720" y="145" font-size="13" font-weight="bold" fill="#c45a11">AiCEmulti</text>
  <line x1="520" y1="81" x2="680" y2="160" stroke="#444" marker-end="url(#arrow)"/>

  <!-- LD -->
  <rect x="600" y="160" width="140" height="58" rx="6" fill="url(#orangeBox)" stroke="#c45a11"/>
  <text x="670" y="182" text-anchor="middle" font-size="11" font-weight="bold">LD Matrix</text>
  <text x="670" y="200" text-anchor="middle" font-size="9">MSA’DNA’VCF’PLINK</text>

  <!-- SCA -->
  <rect x="770" y="160" width="130" height="58" rx="6" fill="url(#orangeBox)" stroke="#c45a11"/>
  <text x="835" y="182" text-anchor="middle" font-size="11" font-weight="bold">SCA Matrix</text>
  <text x="835" y="200" text-anchor="middle" font-size="9">pySCA coupling</text>

  <!-- Multi filter -->
  <rect x="620" y="250" width="260" height="68" rx="6" fill="url(#greenBox)" stroke="#2d8a4e"/>
  <text x="750" y="272" text-anchor="middle" font-size="12" font-weight="bold">Evolutionary Constraint Filter</text>
  <text x="750" y="290" text-anchor="middle" font-size="10">Mean LD e 0.5  &amp;  SCA top 10%</text>
  <text x="750" y="306" text-anchor="middle" font-size="9" fill="#555">epistasis-aware combo</text>
  <line x1="670" y1="218" x2="700" y2="250" stroke="#444" marker-end="url(#arrow)"/>
  <line x1="835" y1="218" x2="800" y2="250" stroke="#444" marker-end="url(#arrow)"/>

  <!-- Multi output -->
  <rect x="670" y="350" width="160" height="48" rx="6" fill="#eee" stroke="#666"/>
  <text x="750" y="372" text-anchor="middle" font-size="11" font-weight="bold">HF Multi Mutations</text>
  <text x="750" y="388" text-anchor="middle" font-size="9">.ld.result / .sca.result</text>
  <line x1="750" y1="318" x2="750" y2="350" stroke="#444" marker-end="url(#arrow)"/>

  <!-- Wet lab -->
  <rect x="320" y="440" width="280" height="52" rx="6" fill="#f0e6ff" stroke="#7b4fbf"/>
  <text x="460" y="462" text-anchor="middle" font-size="12" font-weight="bold">Wet-lab Validation</text>
  <text x="460" y="480" text-anchor="middle" font-size="10">activity / fidelity / editing window &</text>
  <line x1="460" y1="398" x2="460" y2="440" stroke="#444" marker-end="url(#arrow)"/>
  <line x1="750" y1="398" x2="540" y2="440" stroke="#444" marker-end="url(#arrow)"/>

  <!-- Footer -->
  <text x="460" y="510" text-anchor="middle" font-size="9" fill="#888">No task-specific model training; generic inverse folding + constraint filtering</text>
</svg>
