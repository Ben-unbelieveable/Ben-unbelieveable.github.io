<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="860" height="360" viewBox="0 0 860 360">
  <defs>
    <style type="text/css"><![CDATA[
      .title { font: bold 15px Arial, Helvetica, sans-serif; fill: #1a202c; }
      .lbl { font: 12px Arial, Helvetica, sans-serif; fill: #2d3748; }
      .cap { font: 10px Arial, Helvetica, sans-serif; fill: #718096; }
      .panel { fill: #f7fafc; stroke: #cbd5e0; stroke-width: 1.2; }
      .arr { stroke: #2c5282; stroke-width: 1.4; fill: none; marker-end: url(#mk); }
    ]]></style>
    <marker id="mk" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <polygon points="0 0, 8 4, 0 8" fill="#2c5282"/>
    </marker>
  </defs>
  <rect width="100%" height="100%" fill="#ffffff"/>
  <text x="430" y="26" text-anchor="middle" class="title">Fig.3 Rotamer discretization and Packer search state</text>
  <text x="430" y="46" text-anchor="middle" class="cap">continuous chi vs library; joint (aa, rotamer) moves</text>
  <rect x="24" y="64" width="260" height="270" class="panel" rx="6"/>
  <text x="154" y="92" text-anchor="middle" class="lbl" font-weight="bold">Side-chain chi (continuous)</text>
  <circle cx="154" cy="190" r="62" fill="none" stroke="#a0aec0" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="154" y="128" text-anchor="middle" class="cap">chi1 can span 360 deg</text>
  <circle cx="154" cy="128" r="5" fill="#2b6cb0"/>
  <circle cx="200" cy="155" r="5" fill="#2b6cb0"/>
  <circle cx="188" cy="218" r="5" fill="#2b6cb0"/>
  <circle cx="120" cy="218" r="5" fill="#2b6cb0"/>
  <circle cx="108" cy="155" r="5" fill="#2b6cb0"/>
  <text x="154" y="268" text-anchor="middle" class="lbl">huge combinatorics</text>
  <text x="154" y="288" text-anchor="middle" class="lbl">discretize</text>
  <line x1="298" y1="200" x2="338" y2="200" class="arr"/>
  <text x="318" y="192" text-anchor="middle" class="cap" font-size="9">lib</text>
  <rect x="346" y="64" width="200" height="270" class="panel" rx="6"/>
  <text x="446" y="92" text-anchor="middle" class="lbl" font-weight="bold">Dunbrack rotamer</text>
  <text x="446" y="112" text-anchor="middle" class="cap">backbone-dependent</text>
  <circle cx="446" cy="210" r="8" fill="#4299e1"/>
  <line x1="446" y1="210" x2="420" y2="150" stroke="#744210" stroke-width="4" stroke-linecap="round"/>
  <line x1="446" y1="210" x2="470" y2="155" stroke="#a0aec0" stroke-width="3" stroke-linecap="round"/>
  <line x1="446" y1="210" x2="480" y2="200" stroke="#a0aec0" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
  <line x1="446" y1="210" x2="415" y2="235" stroke="#a0aec0" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
  <text x="446" y="260" text-anchor="middle" class="lbl">few high-P states / site</text>
  <text x="446" y="282" text-anchor="middle" class="lbl">x amino-acid choice</text>
  <line x1="554" y1="200" x2="598" y2="200" class="arr"/>
  <text x="576" y="192" text-anchor="middle" class="cap" font-size="9">MC</text>
  <rect x="606" y="64" width="230" height="270" class="panel" rx="6"/>
  <text x="721" y="92" text-anchor="middle" class="lbl" font-weight="bold">One Packer move (schematic)</text>
  <rect x="626" y="112" width="190" height="44" fill="#ebf8ff" stroke="#2b6cb0" stroke-width="1" rx="4"/>
  <text x="721" y="132" text-anchor="middle" class="lbl" font-size="11">state: ... Leu_t ...</text>
  <text x="721" y="150" text-anchor="middle" class="cap">rotamer t, energy E0</text>
  <text x="721" y="178" text-anchor="middle" class="lbl">random proposal</text>
  <rect x="626" y="186" width="190" height="44" fill="#fffaf0" stroke="#dd6b20" stroke-width="1" rx="4"/>
  <text x="721" y="206" text-anchor="middle" class="lbl" font-size="11">try: Ile_u or Leu_t'</text>
  <text x="721" y="224" text-anchor="middle" class="cap">compute E1, deltaE</text>
  <text x="721" y="252" text-anchor="middle" class="lbl">Metropolis + anneal</text>
  <text x="721" y="278" text-anchor="middle" class="lbl">low-E (seq, sidechain)</text>
</svg>
