<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="920" height="420" viewBox="0 0 920 420">
  <defs>
    <style type="text/css"><![CDATA[
      .title { font: bold 14px "Segoe UI", Arial, Helvetica, sans-serif; fill: #1a202c; }
      .sub { font: 10px "Segoe UI", Arial, Helvetica, sans-serif; fill: #4a5568; }
      .lbl { font: 11px "Segoe UI", Arial, Helvetica, sans-serif; fill: #2d3748; }
      .stg { font: bold 12px "Segoe UI", Arial, Helvetica, sans-serif; fill: #2c5282; }
      .box-a { fill: #ebf8ff; stroke: #2b6cb0; stroke-width: 1.2; }
      .box-b { fill: #e6fffa; stroke: #2c7a7b; stroke-width: 1.2; }
      .box-c { fill: #fefce8; stroke: #ca8a04; stroke-width: 1.2; }
      .box-d { fill: #fdf2f8; stroke: #be185d; stroke-width: 1.2; }
      .arr { stroke: #4a5568; stroke-width: 1.25; fill: none; marker-end: url(#ma); }
    ]]></style>
    <marker id="ma" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <polygon points="0 0, 8 4, 0 8" fill="#4a5568"/>
    </marker>
  </defs>
  <rect width="100%" height="100%" fill="#ffffff"/>
  <text x="460" y="26" text-anchor="middle" class="title">Fig.1 Taq pol variant design pipeline (schematic; cf. Tomilova et al., Frontiers Fig.1)</text>
  <text x="460" y="44" text-anchor="middle" class="sub">ProtT5-XL evotuning on homologs, multiparametric assays, Ridge then GP, in silico screen</text>

  <!-- Row 1: 1a 1b -->
  <rect x="24" y="64" width="200" height="88" class="box-a" rx="5"/>
  <text x="124" y="86" text-anchor="middle" class="stg">(1a) Benchmark + evotune</text>
  <text x="124" y="106" text-anchor="middle" class="lbl">PLM + regressor on</text>
  <text x="124" y="122" text-anchor="middle" class="lbl">published DMS (BlaC, avGFP)</text>
  <text x="124" y="142" text-anchor="middle" class="sub">ProtT5-XL: MLM on Taq homologs</text>

  <rect x="248" y="64" width="200" height="88" class="box-b" rx="5"/>
  <text x="348" y="86" text-anchor="middle" class="stg">(1b) Initial mutants</text>
  <text x="348" y="108" text-anchor="middle" class="lbl">Literature + structure:</text>
  <text x="348" y="124" text-anchor="middle" class="lbl">18 sites (round 1)</text>
  <text x="348" y="142" text-anchor="middle" class="sub">six positions, diverse chem.</text>

  <line x1="224" y1="108" x2="246" y2="108" class="arr"/>

  <!-- Arrow to round 2 -->
  <line x1="448" y1="108" x2="472" y2="108" class="arr"/>

  <rect x="472" y="64" width="168" height="88" class="box-c" rx="5"/>
  <text x="556" y="88" text-anchor="middle" class="stg">(2) Wet lab R1</text>
  <text x="556" y="110" text-anchor="middle" class="lbl">Multiparametric</text>
  <text x="556" y="126" text-anchor="middle" class="lbl">RT, PCR, fidelity, Kd, ...</text>
  <text x="556" y="144" text-anchor="middle" class="sub">n ~ 19 (18 + WT)</text>

  <line x1="640" y1="108" x2="664" y2="108" class="arr"/>

  <rect x="664" y="56" width="232" height="104" class="box-a" rx="5"/>
  <text x="780" y="80" text-anchor="middle" class="stg">(3) Ridge on embeddings</text>
  <text x="780" y="100" text-anchor="middle" class="lbl">evotuned ProtT5-XL: mean pool</text>
  <text x="780" y="118" text-anchor="middle" class="lbl">predict properties, pick ~14</text>
  <text x="780" y="136" text-anchor="middle" class="sub">expand training set</text>

  <!-- Row 2 -->
  <line x1="780" y1="168" x2="780" y2="188" class="arr"/>
  <line x1="780" y1="188" x2="556" y2="188" class="arr"/>
  <line x1="556" y1="188" x2="556" y2="208" class="arr"/>

  <rect x="472" y="208" width="168" height="88" class="box-c" rx="5"/>
  <text x="556" y="232" text-anchor="middle" class="stg">(4) Wet lab R2</text>
  <text x="556" y="254" text-anchor="middle" class="lbl">Second batch mutants</text>
  <text x="556" y="272" text-anchor="middle" class="sub">refine labels</text>

  <line x1="640" y1="252" x2="664" y2="252" class="arr"/>

  <rect x="664" y="200" width="232" height="104" class="box-d" rx="5"/>
  <text x="780" y="224" text-anchor="middle" class="stg">(5) GP (GPyTorch)</text>
  <text x="780" y="244" text-anchor="middle" class="lbl">Uncertainty + kernels</text>
  <text x="780" y="262" text-anchor="middle" class="lbl">(Matern / SpectralDelta)</text>
  <text x="780" y="280" text-anchor="middle" class="sub">screen ~18M variants in silico</text>

  <line x1="780" y1="304" x2="780" y2="324" class="arr"/>

  <rect x="664" y="324" width="232" height="72" class="box-b" rx="5"/>
  <text x="780" y="348" text-anchor="middle" class="stg">(6) Wet lab R3 + validation</text>
  <text x="780" y="368" text-anchor="middle" class="lbl">Top candidates, RT-qPCR, etc.</text>

  <!-- Left feedback -->
  <path d="M 124 152 L 124 252 L 472 252" stroke="#805ad5" stroke-width="1.4" fill="none" stroke-dasharray="5 4" marker-end="url(#ma)"/>
  <text x="280" y="242" class="sub" fill="#6b46c1">Iterative model updates with new assays</text>
</svg>
