<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="960" height="400" viewBox="0 0 960 400">
  <defs>
    <style type="text/css"><![CDATA[
      .title { font: bold 15px "Segoe UI", Arial, Helvetica, sans-serif; fill: #1a202c; }
      .sub { font: 11px "Segoe UI", Arial, Helvetica, sans-serif; fill: #4a5568; }
      .lbl { font: 12px "Segoe UI", Arial, Helvetica, sans-serif; fill: #2d3748; }
      .math { font: italic 12px "Times New Roman", Times, serif; fill: #2c5282; }
      .note { font: 11px "Segoe UI", Arial, Helvetica, sans-serif; fill: #553c9a; }
      .box-pool { fill: #edf2f7; stroke: #4a5568; stroke-width: 1.25; }
      .box-plm { fill: #ebf8ff; stroke: #2b6cb0; stroke-width: 1.25; }
      .box-emb { fill: #e6fffa; stroke: #2c7a7b; stroke-width: 1.25; }
      .box-rf { fill: #fefce8; stroke: #ca8a04; stroke-width: 1.25; }
      .box-lab { fill: #fdf2f8; stroke: #be185d; stroke-width: 1.25; }
      .box-note { fill: #f7fafc; stroke: #cbd5e0; stroke-width: 1; }
      .arr { stroke: #2c5282; stroke-width: 1.35; fill: none; marker-end: url(#mArrow); }
      .arr-loop { stroke: #805ad5; stroke-width: 1.5; fill: none; marker-end: url(#mLoop); stroke-dasharray: 6 4; }
    ]]></style>
    <marker id="mArrow" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto">
      <polygon points="0 0, 9 4.5, 0 9" fill="#2c5282"/>
    </marker>
    <marker id="mLoop" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto">
      <polygon points="0 0, 9 4.5, 0 9" fill="#805ad5"/>
    </marker>
  </defs>
  <rect width="100%" height="100%" fill="#ffffff"/>

  <text x="480" y="28" text-anchor="middle" class="title">Fig.1 EVOLVEpro pipeline and active-learning loop (schematic; cf. Jiang et al., Science Fig.1A)</text>
  <text x="480" y="48" text-anchor="middle" class="sub">Frozen ESM-2 embeddings, mean-pooled e-bar, random-forest regression, top-K wet-lab testing, iterate</text>

  <rect x="32" y="78" width="108" height="72" class="box-pool" rx="5"/>
  <text x="86" y="104" text-anchor="middle" class="lbl" font-weight="600">Mutant pool</text>
  <text x="86" y="124" text-anchor="middle" class="sub">sequence space</text>
  <text x="86" y="142" text-anchor="middle" class="sub">(single / combo)</text>

  <line x1="140" y1="114" x2="168" y2="114" class="arr"/>

  <rect x="170" y="72" width="128" height="84" class="box-plm" rx="5"/>
  <text x="234" y="98" text-anchor="middle" class="lbl" font-weight="600">ESM-2 (frozen)</text>
  <text x="234" y="118" text-anchor="middle" class="sub">last-layer tokens</text>
  <text x="234" y="136" text-anchor="middle" class="math">E in R^{n x d}</text>

  <line x1="298" y1="114" x2="326" y2="114" class="arr"/>

  <rect x="328" y="78" width="100" height="72" class="box-emb" rx="5"/>
  <text x="378" y="108" text-anchor="middle" class="lbl" font-weight="600">Mean pool</text>
  <text x="378" y="128" text-anchor="middle" class="math">e-bar = mean(E)</text>
  <text x="378" y="144" text-anchor="middle" class="sub">fixed dim d</text>

  <line x1="428" y1="114" x2="456" y2="114" class="arr"/>

  <rect x="458" y="74" width="132" height="80" class="box-rf" rx="5"/>
  <text x="524" y="100" text-anchor="middle" class="lbl" font-weight="600">Random forest</text>
  <text x="524" y="120" text-anchor="middle" class="sub">T = 100 trees</text>
  <text x="524" y="138" text-anchor="middle" class="math">f(e-bar) -> y-hat</text>

  <line x1="590" y1="114" x2="618" y2="114" class="arr"/>

  <rect x="620" y="78" width="100" height="72" class="box-pool" rx="5"/>
  <text x="670" y="106" text-anchor="middle" class="lbl" font-weight="600">top-K</text>
  <text x="670" y="128" text-anchor="middle" class="sub">next round</text>

  <line x1="720" y1="114" x2="748" y2="114" class="arr"/>

  <rect x="750" y="74" width="178" height="80" class="box-lab" rx="5"/>
  <text x="839" y="102" text-anchor="middle" class="lbl" font-weight="600">Wet-lab assay</text>
  <text x="839" y="122" text-anchor="middle" class="sub">readout y (activity, etc.)</text>
  <text x="839" y="142" text-anchor="middle" class="sub">(seq, y) -> training set D</text>

  <path d="M 839 154 L 839 228 L 32 228 L 32 114" class="arr-loop"/>
  <text x="480" y="252" text-anchor="middle" class="note">Iterate: expand D, retrain RF; score untested variants again until budget or target met</text>

  <rect x="32" y="288" width="896" height="92" class="box-note" rx="4"/>
  <text x="48" y="310" class="lbl" font-weight="600">vs. zero-shot PLM fitness (e.g. pMMS)</text>
  <text x="48" y="330" class="sub">Evolutionary likelihood is not task activity; f(e-bar) is anchored by experimental y, so EVOLVEpro picks can diverge from base PLM rankings.</text>
  <text x="48" y="348" class="sub">Round-1 mutants: grid search favors random draws over embedding-only K-medoids diversity for the first batch.</text>
</svg>
