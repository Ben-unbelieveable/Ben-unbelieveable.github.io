<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 300" font-family="Segoe UI, 'Microsoft YaHei', sans-serif">
  <defs>
    <linearGradient id="hdom" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4a6fa5"/><stop offset="100%" stop-color="#2c5282"/>
    </linearGradient>
    <linearGradient id="ldom" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#cbd5e0"/><stop offset="100%" stop-color="#718096"/>
    </linearGradient>
  </defs>
  <rect width="780" height="300" fill="#fafafa"/>
  <text x="390" y="26" text-anchor="middle" font-size="15" fill="#1a202c" font-weight="600">图 2　单条重链与单条轻链：肽链走向、域顺序与 H–L 配对界面</text>
  <text x="390" y="44" text-anchor="middle" font-size="10" fill="#718096">一条重链仅含一个 CH3（C 端）；完整 IgG 由两条 H 与两条 L 对称装配为 H2L2</text>

  <!-- 轻链 -->
  <text x="36" y="88" font-size="12" fill="#4a5568" font-weight="600">轻链 L</text>
  <path d="M 118 78 C 155 78 175 108 195 138" fill="none" stroke="#718096" stroke-width="4" stroke-linecap="round"/>
  <ellipse cx="118" cy="78" rx="34" ry="21" fill="url(#ldom)" stroke="#4a5568" stroke-width="1.5"/>
  <text x="118" y="82" text-anchor="middle" font-size="11" fill="#1a202c" font-weight="600">VL</text>
  <text x="88" y="70" font-size="9" fill="#c53030">N</text>
  <ellipse cx="205" cy="145" rx="34" ry="21" fill="url(#ldom)" stroke="#4a5568" stroke-width="1.5"/>
  <text x="205" y="149" text-anchor="middle" font-size="11" fill="#1a202c">CL</text>
  <text x="232" y="158" font-size="9" fill="#718096">C（L 末端）</text>

  <!-- 重链 -->
  <text x="36" y="188" font-size="12" fill="#2c5282" font-weight="600">重链 H</text>
  <path d="M 118 120 L 118 136 L 165 158 L 195 188 L 230 218 Q 255 248 295 258 L 360 268 L 430 272 L 500 268" fill="none" stroke="#2c5282" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <ellipse cx="118" cy="98" rx="36" ry="22" fill="url(#hdom)" stroke="#1a365d" stroke-width="1.5"/>
  <text x="118" y="102" text-anchor="middle" font-size="11" fill="#fff" font-weight="600">VH</text>
  <text x="88" y="98" font-size="9" fill="#c53030">N</text>
  <ellipse cx="172" cy="158" rx="36" ry="22" fill="url(#hdom)" stroke="#1a365d" stroke-width="1.5"/>
  <text x="172" y="162" text-anchor="middle" font-size="11" fill="#fff">CH1</text>
  <path d="M 205 188 Q 218 205 232 188 Q 246 172 260 188 Q 274 205 288 220" fill="none" stroke="#d69e2e" stroke-width="4"/>
  <text x="242" y="198" font-size="10" fill="#975a16" font-weight="600">hinge</text>
  <ellipse cx="318" cy="238" rx="40" ry="25" fill="#5a67d8" fill-opacity="0.92" stroke="#3730a3" stroke-width="1.5"/>
  <text x="318" y="234" text-anchor="middle" font-size="11" fill="#fff">CH2</text>
  <text x="318" y="248" text-anchor="middle" font-size="8" fill="#e9e3ff">N-糖链位点</text>
  <ellipse cx="418" cy="258" rx="38" ry="24" fill="url(#hdom)" stroke="#1a365d" stroke-width="1.5"/>
  <text x="418" y="263" text-anchor="middle" font-size="11" fill="#fff">CH3</text>
  <text x="470" y="262" font-size="9" fill="#c53030">C（H 末端）</text>

  <!-- 配对 -->
  <line x1="118" y1="78" x2="118" y2="98" stroke="#c53030" stroke-width="1.2" stroke-dasharray="5 4" opacity="0.85"/>
  <text x="125" y="92" font-size="9" fill="#c53030">配对</text>
  <line x1="172" y1="158" x2="205" y2="145" stroke="#c53030" stroke-width="1.2" stroke-dasharray="5 4" opacity="0.85"/>
  <text x="195" y="138" font-size="9" fill="#c53030">配对</text>

  <rect x="520" y="58" width="240" height="118" fill="#fff" stroke="#e2e8f0" rx="4"/>
  <text x="530" y="78" font-size="11" fill="#1a202c" font-weight="600">界面（非共价 + 二硫键）</text>
  <text x="530" y="98" font-size="10" fill="#4a5568">• VH–VL：互补位（paratope）位于此界面顶端环区</text>
  <text x="530" y="114" font-size="10" fill="#4a5568">• CH1–CL：稳定 Fab 下半部</text>
  <text x="530" y="130" font-size="10" fill="#4a5568">• 虚线示两条链空间靠近；二硫键见全文图 1</text>
  <text x="530" y="154" font-size="10" fill="#2b6cb0">另有一条 H 与一条 L 以相同方式装配对称臂</text>
</svg>
