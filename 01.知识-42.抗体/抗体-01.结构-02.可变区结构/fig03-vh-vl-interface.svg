<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 440" font-family="Segoe UI, 'Microsoft YaHei', sans-serif">
  <defs>
    <linearGradient id="vhfill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#63b3ed"/><stop offset="100%" stop-color="#2b6cb0"/>
    </linearGradient>
    <linearGradient id="vlfill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9ae6b4"/><stop offset="100%" stop-color="#276749"/>
    </linearGradient>
  </defs>
  <rect width="700" height="440" fill="#fafafa"/>
  <text x="350" y="26" text-anchor="middle" font-size="15" fill="#1a202c" font-weight="600">图 3　VH–VL 二聚界面：相对取向、配对裂隙与保守堆积</text>
  <text x="350" y="44" text-anchor="middle" font-size="10" fill="#718096">俯视互补位；两域绕界面轴约 50° 相对旋转（Fab 结构统计）</text>
  <g transform="rotate(-15 240 200)">
    <ellipse cx="240" cy="200" rx="108" ry="68" fill="url(#vhfill)" fill-opacity="0.25" stroke="#2b6cb0" stroke-width="2.5"/>
    <text x="240" y="196" text-anchor="middle" font-size="14" fill="#1a365d" font-weight="600">VH</text>
    <text x="240" y="212" text-anchor="middle" font-size="8" fill="#2d3748">FR 主体</text>
    <path d="M 320 165 L 340 200 L 320 235" fill="none" stroke="#1a365d" stroke-width="3"/>
    <text x="348" y="168" font-size="8" fill="#2b6cb0">界面</text>
    <text x="348" y="180" font-size="8" fill="#2b6cb0">β 链</text>
  </g>
  <g transform="rotate(15 460 200)">
    <ellipse cx="460" cy="200" rx="102" ry="64" fill="url(#vlfill)" fill-opacity="0.25" stroke="#276749" stroke-width="2.5"/>
    <text x="460" y="196" text-anchor="middle" font-size="14" fill="#22543d" font-weight="600">VL</text>
    <text x="460" y="212" text-anchor="middle" font-size="8" fill="#2d3748">FR 主体</text>
    <path d="M 380 165 L 360 200 L 380 235" fill="none" stroke="#22543d" stroke-width="3"/>
  </g>
  <circle cx="352" cy="188" r="7" fill="#d69e2e" stroke="#975a16" stroke-width="1.5"/>
  <text x="362" y="182" font-size="8" fill="#744210">Trp</text>
  <text x="362" y="192" font-size="7" fill="#744210">(VH)</text>
  <circle cx="348" cy="212" r="6" fill="#d69e2e" stroke="#975a16" stroke-width="1.5"/>
  <text x="358" y="222" font-size="8" fill="#744210">Met (VL)</text>
  <path d="M 318 155 Q 340 128 352 118 Q 358 112 365 108" fill="none" stroke="#dd6b20" stroke-width="3.5" stroke-linecap="round"/>
  <text x="368" y="104" font-size="8" fill="#c05621">H1</text>
  <path d="M 382 155 Q 358 128 345 118" fill="none" stroke="#dd6b20" stroke-width="3.5" stroke-linecap="round"/>
  <text x="332" y="104" font-size="8" fill="#c05621">L1</text>
  <path d="M 310 228 Q 335 255 348 278 Q 355 292 358 308" fill="none" stroke="#c05621" stroke-width="5" stroke-linecap="round"/>
  <text x="362" y="318" font-size="9" fill="#9b2c2c" font-weight="600">H3</text>
  <path d="M 390 228 Q 365 252 352 272" fill="none" stroke="#dd6b20" stroke-width="3.5" stroke-linecap="round"/>
  <text x="338" y="278" font-size="8" fill="#c05621">L3</text>
  <ellipse cx="350" cy="200" rx="32" ry="72" fill="#feb2b2" fill-opacity="0.2" stroke="#e53e3e" stroke-width="2" transform="rotate(-8 350 200)"/>
  <text x="350" y="200" text-anchor="middle" font-size="9" fill="#742a2a">抗原</text>
  <text x="350" y="212" text-anchor="middle" font-size="9" fill="#742a2a">裂隙</text>
  <path d="M 350 320 A 55 55 0 0 1 290 280" fill="none" stroke="#4a5568" stroke-width="1.5"/>
  <text x="295" y="335" font-size="9" fill="#4a5568">~50° 相对旋转</text>
  <rect x="30" y="68" width="200" height="130" fill="#fff" stroke="#e2e8f0" rx="4"/>
  <text x="42" y="88" font-size="10" fill="#1a202c" font-weight="600">界面特征</text>
  <text x="42" y="108" font-size="9" fill="#4a5568">• 疏水堆积：VH Trp、VL Met/Tyr</text>
  <text x="42" y="124" font-size="9" fill="#4a5568">• 盐桥与氢键稳定二聚体</text>
  <text x="42" y="140" font-size="9" fill="#4a5568">• CDR 环在界面「上方」伸出</text>
  <text x="42" y="156" font-size="9" fill="#4a5568">• FR3/FR4 参与界面接触</text>
  <text x="42" y="180" font-size="9" fill="#718096">Fv = VH + VL（无 CH1/CL）</text>
  <rect x="470" y="68" width="200" height="130" fill="#fff" stroke="#e2e8f0" rx="4"/>
  <text x="482" y="88" font-size="10" fill="#1a202c" font-weight="600">VH vs VL 界面差异</text>
  <text x="482" y="108" font-size="9" fill="#4a5568">• VH 界面略大，凹槽更深</text>
  <text x="482" y="124" font-size="9" fill="#4a5568">• H3 从 VH 底缘伸出，构象</text>
  <text x="482" y="136" font-size="9" fill="#4a5568">  空间远大于 L3</text>
  <text x="482" y="156" font-size="9" fill="#4a5568">• κ 与 λ 轻链界面模式相似</text>
  <text x="482" y="172" font-size="9" fill="#4a5568">  但 L1 长度分布不同</text>
  <text x="350" y="400" text-anchor="middle" font-size="10" fill="#4a5568">互补位（paratope）= 六条 CDR 环共同塑造的三维表面；H3 常主导深度与形状</text>
  <text x="350" y="418" text-anchor="middle" font-size="9" fill="#718096">示意拓扑；精细原子接触见高分辨率 Fab 结构（如 PDB 1HZH、7DK2）</text>
</svg>