<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 420" font-family="Segoe UI, 'Microsoft YaHei', sans-serif">
  <defs>
    <linearGradient id="vseg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#63b3ed"/><stop offset="100%" stop-color="#2b6cb0"/>
    </linearGradient>
    <linearGradient id="dseg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f6ad55"/><stop offset="100%" stop-color="#c05621"/>
    </linearGradient>
    <linearGradient id="jseg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#9ae6b4"/><stop offset="100%" stop-color="#276749"/>
    </linearGradient>
    <linearGradient id="frg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e2e8f0"/><stop offset="100%" stop-color="#a0aec0"/>
    </linearGradient>
    <linearGradient id="cdrg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fbd38d"/><stop offset="100%" stop-color="#dd6b20"/>
    </linearGradient>
  </defs>
  <rect width="820" height="420" fill="#fafafa"/>
  <text x="410" y="26" text-anchor="middle" font-size="15" fill="#1a202c" font-weight="600">图 6　V(D)J 基因片段与可变区 FR/CDR 的对应关系</text>
  <text x="410" y="44" text-anchor="middle" font-size="10" fill="#718096">胚系片段经重组、修剪与 N 区添加后表达为 VH/VL；色块宽度为示意</text>

  <!-- VH germline -->
  <text x="40" y="78" font-size="12" fill="#2b6cb0" font-weight="600">重链 VH：V–D–J 重组</text>
  <text x="40" y="94" font-size="9" fill="#718096">胚系（重排前，示意）</text>
  <rect x="40" y="102" width="380" height="28" fill="#ebf8ff" stroke="#bee3f8" rx="3"/>
  <rect x="42" y="104" width="220" height="24" fill="url(#vseg)" rx="2"/><text x="152" y="120" text-anchor="middle" font-size="10" fill="#fff" font-weight="600">V 基因（数十个）</text>
  <rect x="264" y="104" width="72" height="24" fill="url(#dseg)" rx="2"/><text x="300" y="120" text-anchor="middle" font-size="9" fill="#fff" font-weight="600">D</text>
  <rect x="338" y="104" width="80" height="24" fill="url(#jseg)" rx="2"/><text x="378" y="120" text-anchor="middle" font-size="9" fill="#fff" font-weight="600">J</text>
  <text x="430" y="120" font-size="14" fill="#4a5568">→</text>

  <!-- VH product -->
  <text x="450" y="94" font-size="9" fill="#718096">重排后表达的 VH 域</text>
  <rect x="450" y="102" width="330" height="28" fill="#fff" stroke="#cbd5e0" rx="3"/>
  <rect x="452" y="104" width="58" height="24" fill="url(#frg)" stroke="#718096" rx="2"/><text x="481" y="120" text-anchor="middle" font-size="8" fill="#1a202c">FR1</text>
  <rect x="512" y="104" width="36" height="24" fill="url(#cdrg)" stroke="#c05621" rx="2"/><text x="530" y="120" text-anchor="middle" font-size="8" fill="#fff">H1</text>
  <rect x="550" y="104" width="52" height="24" fill="url(#frg)" stroke="#718096" rx="2"/><text x="576" y="120" text-anchor="middle" font-size="8" fill="#1a202c">FR2</text>
  <rect x="604" y="104" width="44" height="24" fill="url(#cdrg)" stroke="#c05621" rx="2"/><text x="626" y="120" text-anchor="middle" font-size="8" fill="#fff">H2</text>
  <rect x="650" y="104" width="48" height="24" fill="url(#frg)" stroke="#718096" rx="2"/><text x="674" y="120" text-anchor="middle" font-size="8" fill="#1a202c">FR3</text>
  <rect x="700" y="104" width="78" height="24" fill="#9b2c2c" stroke="#742a2a" rx="2"/><text x="739" y="120" text-anchor="middle" font-size="8" fill="#fff" font-weight="600">H3</text>

  <!-- VH H3 annotation -->
  <path d="M 264 132 L 264 155 L 739 155 L 739 132" fill="none" stroke="#c05621" stroke-width="1.2" stroke-dasharray="4 3"/>
  <text x="500" y="170" text-anchor="middle" font-size="9" fill="#9b2c2c">CDR-H3 = V 3' 端 + D 全长 + J 5' 端（经 P/N 核苷酸添加与末端修剪）</text>

  <!-- color key for VH segments in H3 -->
  <rect x="450" y="182" width="330" height="22" fill="#fff" stroke="#e2e8f0" rx="3"/>
  <rect x="458" y="186" width="90" height="14" fill="url(#vseg)" rx="2"/><text x="503" y="197" text-anchor="middle" font-size="7" fill="#fff">V 贡献</text>
  <rect x="556" y="186" width="50" height="14" fill="url(#dseg)" rx="2"/><text x="581" y="197" text-anchor="middle" font-size="7" fill="#fff">D</text>
  <rect x="614" y="186" width="50" height="14" fill="url(#jseg)" rx="2"/><text x="639" y="197" text-anchor="middle" font-size="7" fill="#fff">J</text>
  <text x="680" y="197" font-size="8" fill="#4a5568">→ 拼成 H3 环</text>

  <!-- VL kappa -->
  <text x="40" y="232" font-size="12" fill="#276749" font-weight="600">轻链 VL（κ 型）：V–J 重组（无 D）</text>
  <text x="40" y="248" font-size="9" fill="#718096">胚系</text>
  <rect x="40" y="256" width="280" height="28" fill="#f0fff4" stroke="#c6f6d5" rx="3"/>
  <rect x="42" y="258" width="190" height="24" fill="url(#vseg)" rx="2"/><text x="137" y="274" text-anchor="middle" font-size="10" fill="#fff" font-weight="600">Vκ 基因</text>
  <rect x="234" y="258" width="84" height="24" fill="url(#jseg)" rx="2"/><text x="276" y="274" text-anchor="middle" font-size="9" fill="#fff" font-weight="600">Jκ</text>
  <text x="330" y="274" font-size="14" fill="#4a5568">→</text>

  <text x="350" y="248" font-size="9" fill="#718096">重排后 VLκ</text>
  <rect x="350" y="256" width="330" height="28" fill="#fff" stroke="#cbd5e0" rx="3"/>
  <rect x="352" y="258" width="54" height="24" fill="url(#frg)" stroke="#718096" rx="2"/><text x="379" y="274" text-anchor="middle" font-size="8" fill="#1a202c">FR1</text>
  <rect x="408" y="258" width="48" height="24" fill="url(#cdrg)" stroke="#c05621" rx="2"/><text x="432" y="274" text-anchor="middle" font-size="8" fill="#fff">L1</text>
  <rect x="458" y="258" width="50" height="24" fill="url(#frg)" stroke="#718096" rx="2"/><text x="483" y="274" text-anchor="middle" font-size="8" fill="#1a202c">FR2</text>
  <rect x="510" y="258" width="28" height="24" fill="url(#cdrg)" stroke="#c05621" rx="2"/><text x="524" y="274" text-anchor="middle" font-size="8" fill="#fff">L2</text>
  <rect x="540" y="258" width="46" height="24" fill="url(#frg)" stroke="#718096" rx="2"/><text x="563" y="274" text-anchor="middle" font-size="8" fill="#1a202c">FR3</text>
  <rect x="588" y="258" width="52" height="24" fill="url(#cdrg)" stroke="#c05621" rx="2"/><text x="614" y="274" text-anchor="middle" font-size="8" fill="#fff">L3</text>
  <rect x="642" y="258" width="36" height="24" fill="url(#frg)" stroke="#718096" rx="2"/><text x="660" y="274" text-anchor="middle" font-size="8" fill="#1a202c">FR4</text>

  <path d="M 234 284 L 234 302 L 614 302 L 614 284" fill="none" stroke="#276749" stroke-width="1.2" stroke-dasharray="4 3"/>
  <text x="420" y="316" text-anchor="middle" font-size="9" fill="#276749">CDR-L3 = Vκ 3' 端 + Jκ 5' 端（无 D 基因参与）</text>

  <!-- lambda note -->
  <text x="40" y="342" font-size="10" fill="#4a5568">λ 型轻链逻辑相同：<tspan fill="#2b6cb0" font-weight="600">Vλ + Jλ</tspan> → VLλ；下游恒定区为 <tspan font-weight="600">Cλ</tspan>（κ 则为 Cκ）</text>

  <!-- summary box -->
  <rect x="40" y="356" width="740" height="52" fill="#fff" stroke="#e2e8f0" rx="4"/>
  <text x="55" y="376" font-size="10" fill="#1a202c" font-weight="600">记忆要点</text>
  <text x="55" y="394" font-size="9" fill="#4a5568">• CDR1/CDR2 序列主要来自所选 V 基因；CDR3 几乎全部在连接处形成，是重排多样性的「主战场」</text>
  <text x="430" y="394" font-size="9" fill="#4a5568">• 重链恒定区（CH）由另一转录本经类别转换决定，不在 V(D)J 步完成</text>
</svg>