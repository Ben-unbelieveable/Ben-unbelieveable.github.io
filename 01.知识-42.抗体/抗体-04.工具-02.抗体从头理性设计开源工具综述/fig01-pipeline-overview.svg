<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 1180" font-family="Segoe UI, Microsoft YaHei, PingFang SC, sans-serif">
  <defs>
    <linearGradient id="g0" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#bee3f8"/><stop offset="100%" stop-color="#4299e1"/></linearGradient>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#c3dafe"/><stop offset="100%" stop-color="#667eea"/></linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#fbd38d"/><stop offset="100%" stop-color="#ed8936"/></linearGradient>
    <linearGradient id="g3" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#fbb6ce"/><stop offset="100%" stop-color="#d53f8c"/></linearGradient>
    <linearGradient id="g4" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#d6bcfa"/><stop offset="100%" stop-color="#805ad5"/></linearGradient>
    <linearGradient id="g5" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#b2f5ea"/><stop offset="100%" stop-color="#319795"/></linearGradient>
    <linearGradient id="g6" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#9ae6b4"/><stop offset="100%" stop-color="#38a169"/></linearGradient>
    <linearGradient id="g7" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#faf089"/><stop offset="100%" stop-color="#d69e2e"/></linearGradient>
    <linearGradient id="g8" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#feb2b2"/><stop offset="100%" stop-color="#e53e3e"/></linearGradient>
    <linearGradient id="gwet" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#fc8181"/><stop offset="100%" stop-color="#9b2c2c"/></linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><polygon points="0,0 10,5 0,10" fill="#4a5568"/></marker>
    <marker id="arrowLoop" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><polygon points="0,0 8,4 0,8" fill="#c05621"/></marker>
    <style><![CDATA[
      .title{font-size:18px;font-weight:700;fill:#1a202c}.subtitle{font-size:11px;fill:#718096}
      .step-num{font-size:13px;font-weight:700;fill:#fff}.step-title{font-size:14px;font-weight:700;fill:#1a202c}
      .step-out{font-size:10.5px;fill:#4a5568}.step-tool{font-size:9.5px;fill:#2d3748;font-style:italic}
      .phase{font-size:10px;font-weight:600;fill:#4a5568}.loop-label{font-size:10px;fill:#c05621;font-weight:600}
      .wet{font-size:13px;font-weight:700;fill:#fff}
    ]]></style>
  </defs>
  <rect width="920" height="1180" fill="#fafafa"/>
  <text x="460" y="36" text-anchor="middle" class="title">图 2　抗体从头理性设计 · 端到端计算闭环（步骤 0–8）</text>
  <text x="460" y="58" text-anchor="middle" class="subtitle">实线主流程自上而下；步骤 3–6 间可迭代（虚线反馈）</text>
  <text x="36" y="100" class="phase">准备</text><text x="36" y="340" class="phase">设计</text>
  <text x="36" y="580" class="phase">验证</text><text x="36" y="780" class="phase">筛选</text><text x="36" y="980" class="phase">定稿</text>
  <rect x="120" y="78" width="680" height="88" rx="10" fill="url(#g0)" stroke="#2b6cb0" stroke-width="1.5"/>
  <circle cx="156" cy="122" r="22" fill="#2b6cb0"/><text x="156" y="127" text-anchor="middle" class="step-num">0</text>
  <text x="192" y="108" class="step-title">靶标与表位定义</text>
  <text x="192" y="126" class="step-out">输出：抗原结构/构象、热点残基、表面可及性</text>
  <text x="192" y="144" class="step-tool">工具：BepiPred 3.0 · DiscoTope 3.0 · Boltz / AF2 / ESMFold</text>
  <line x1="460" y1="166" x2="460" y2="188" stroke="#4a5568" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="120" y="188" width="680" height="88" rx="10" fill="url(#g1)" stroke="#5a67d8" stroke-width="1.5"/>
  <circle cx="156" cy="232" r="22" fill="#5a67d8"/><text x="156" y="237" text-anchor="middle" class="step-num">1</text>
  <text x="192" y="218" class="step-title">格式与框架选择</text>
  <text x="192" y="236" class="step-out">输出：VHH / scFv / Fab；FR 模板；VH–VL 配对</text>
  <text x="192" y="254" class="step-tool">工具：ANARCI · SAbDab · OAS · ABPair</text>
  <line x1="460" y1="276" x2="460" y2="298" stroke="#4a5568" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="120" y="298" width="680" height="88" rx="10" fill="url(#g2)" stroke="#c05621" stroke-width="1.5"/>
  <circle cx="156" cy="342" r="22" fill="#c05621"/><text x="156" y="347" text-anchor="middle" class="step-num">2</text>
  <text x="192" y="328" class="step-title">结合位点 / CDR 骨架设计</text>
  <text x="192" y="346" class="step-out">输出：CDR 环构象、对接姿态、表位约束复合物</text>
  <text x="192" y="364" class="step-tool">工具：RFantibody · Germinal · mBER · DiffAb · HADDOCK3</text>
  <line x1="460" y1="386" x2="460" y2="408" stroke="#4a5568" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="120" y="408" width="680" height="88" rx="10" fill="url(#g3)" stroke="#b83280" stroke-width="1.5"/>
  <circle cx="156" cy="452" r="22" fill="#b83280"/><text x="156" y="457" text-anchor="middle" class="step-num">3</text>
  <text x="192" y="438" class="step-title">序列设计 / 生成</text>
  <text x="192" y="456" class="step-out">输出：CDR 或全长 VH/VL 候选序列库（10²–10⁴）</text>
  <text x="192" y="474" class="step-tool">工具：ProteinMPNN · AbMPNN · AbLang · IgLM · AbBFN2</text>
  <path d="M 820 452 C 870 452, 880 520, 880 590 C 880 660, 870 728, 820 728" fill="none" stroke="#c05621" stroke-width="2" stroke-dasharray="8 5" marker-end="url(#arrowLoop)"/>
  <text x="892" y="590" class="loop-label" transform="rotate(90 892 590)">迭代：序列 ↔ 结构 ↔ 打分</text>
  <line x1="460" y1="496" x2="460" y2="518" stroke="#4a5568" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="120" y="518" width="680" height="88" rx="10" fill="url(#g4)" stroke="#6b46c1" stroke-width="1.5"/>
  <circle cx="156" cy="562" r="22" fill="#6b46c1"/><text x="156" y="567" text-anchor="middle" class="step-num">4</text>
  <text x="192" y="548" class="step-title">结构与复合物预测</text>
  <text x="192" y="566" class="step-out">输出：抗体单体、Ab–Ag 复合物；pLDDT / ipTM / PAE</text>
  <text x="192" y="584" class="step-tool">工具：IgFold · ImmuneBuilder · AF2-Multimer · Boltz · Chai</text>
  <line x1="460" y1="606" x2="460" y2="628" stroke="#4a5568" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="120" y="628" width="680" height="88" rx="10" fill="url(#g5)" stroke="#2c7a7b" stroke-width="1.5"/>
  <circle cx="156" cy="672" r="22" fill="#2c7a7b"/><text x="156" y="677" text-anchor="middle" class="step-num">5</text>
  <text x="192" y="658" class="step-title">对接与界面精修</text>
  <text x="192" y="676" class="step-out">输出：优化后界面氢键、packing、侧链构象</text>
  <text x="192" y="694" class="step-tool">工具：HADDOCK3 · SnugDock · PyRosetta relax · OpenMM</text>
  <line x1="460" y1="716" x2="460" y2="738" stroke="#4a5568" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="120" y="738" width="680" height="88" rx="10" fill="url(#g6)" stroke="#276749" stroke-width="1.5"/>
  <circle cx="156" cy="782" r="22" fill="#276749"/><text x="156" y="787" text-anchor="middle" class="step-num">6</text>
  <text x="192" y="768" class="step-title">亲和力 / 稳定性打分</text>
  <text x="192" y="786" class="step-out">输出：ΔΔG、界面能量、候选排序（top N）</text>
  <text x="192" y="804" class="step-tool">工具：GearBind · AttABseq · Rosetta Flex ddG · Prodigy</text>
  <line x1="460" y1="826" x2="460" y2="848" stroke="#4a5568" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="120" y="848" width="680" height="88" rx="10" fill="url(#g7)" stroke="#b7791f" stroke-width="1.5"/>
  <circle cx="156" cy="892" r="22" fill="#b7791f"/><text x="156" y="897" text-anchor="middle" class="step-num">7</text>
  <text x="192" y="878" class="step-title">可开发性与人源化</text>
  <text x="192" y="896" class="step-out">输出：溶解度/聚集/humanness 过滤后序列</text>
  <text x="192" y="914" class="step-tool">工具：BioPhi · CamSol · TANGO · SoluProt · AbBFN2</text>
  <line x1="460" y1="936" x2="460" y2="958" stroke="#4a5568" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="120" y="958" width="680" height="88" rx="10" fill="url(#g8)" stroke="#c53030" stroke-width="1.5"/>
  <circle cx="156" cy="1002" r="22" fill="#c53030"/><text x="156" y="1007" text-anchor="middle" class="step-num">8</text>
  <text x="192" y="988" class="step-title">序列定稿与合成前校验</text>
  <text x="192" y="1006" class="step-out">输出：IMGT 编号、密码子优化、表达 cassette</text>
  <text x="192" y="1024" class="step-tool">工具：ANARCI · BioPhi Designer · CodonOptimizer</text>
  <line x1="460" y1="1046" x2="460" y2="1068" stroke="#4a5568" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="200" y="1068" width="520" height="72" rx="12" fill="url(#gwet)" stroke="#742a2a" stroke-width="2"/>
  <text x="460" y="1100" text-anchor="middle" class="wet">湿实验闭环</text>
  <text x="460" y="1120" text-anchor="middle" font-size="11" fill="#fed7d7">基因合成 → 表达纯化 → BLI / SPR / ELISA → 数据回流迭代</text>
  <path d="M 120 782 C 60 782, 50 452, 120 452" fill="none" stroke="#c05621" stroke-width="1.8" stroke-dasharray="6 4" marker-end="url(#arrowLoop)"/>
  <text x="72" y="620" class="loop-label" transform="rotate(-90 72 620)">未通过过滤</text>
  <text x="460" y="1168" text-anchor="middle" class="subtitle">一体化 pipeline（RFantibody · Germinal · mBER）将步骤 2–6 打包，见 §11</text>
</svg>