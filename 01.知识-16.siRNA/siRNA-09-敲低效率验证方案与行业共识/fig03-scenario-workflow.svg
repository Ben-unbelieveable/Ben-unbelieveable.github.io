<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 340" font-family="Segoe UI, 'Microsoft YaHei', sans-serif">
  <rect width="780" height="340" fill="#fafafa"/>
  <text x="390" y="26" text-anchor="middle" font-size="15" fill="#1a202c" font-weight="600">图 3　按应用场景推荐的验证组合（行业常见做法）</text>
  <text x="390" y="44" text-anchor="middle" font-size="10" fill="#718096">非强制标准；高影响因子期刊与 IND 申报通常要求更严</text>
  <!-- three columns -->
  <rect x="30" y="60" width="220" height="250" fill="#fff" stroke="#bee3f8" stroke-width="2" rx="6"/>
  <text x="140" y="82" text-anchor="middle" font-size="12" fill="#2b6cb0" font-weight="600">基础研究 / 细胞系</text>
  <text x="45" y="104" font-size="9" fill="#4a5568">• NTC + mock 对照</text>
  <text x="45" y="122" font-size="9" fill="#4a5568">• ≥2 条独立 siRNA（不同靶区）</text>
  <text x="45" y="140" font-size="9" fill="#4a5568">• qPCR（引物跨切割位点）</text>
  <text x="45" y="158" font-size="9" fill="#4a5568">• Western 或流式（若关心蛋白）</text>
  <text x="45" y="176" font-size="9" fill="#4a5568">• 48–72 h 时间窗 + 剂量滴定</text>
  <text x="45" y="200" font-size="9" fill="#718096">可选：双荧光素酶、rescue</text>
  <text x="45" y="218" font-size="9" fill="#718096">高 stakes：RNA-seq 脱靶</text>
  <text x="45" y="248" font-size="8" fill="#2b6cb0" font-weight="600">共识：mRNA ↓≥70% 为「良好」</text>
  <text x="45" y="264" font-size="8" fill="#718096">（经验阈值，非绝对）</text>
  <rect x="280" y="60" width="220" height="250" fill="#fff" stroke="#9ae6b4" stroke-width="2" rx="6"/>
  <text x="390" y="82" text-anchor="middle" font-size="12" fill="#276749" font-weight="600">候选序列筛选 / CRO</text>
  <text x="295" y="104" font-size="9" fill="#4a5568">• 每条候选：qPCR + 活力</text>
  <text x="295" y="122" font-size="9" fill="#4a5568">• Top 3–5 序列并行比较</text>
  <text x="295" y="140" font-size="9" fill="#4a5568">• 双荧光素酶（Reporter 验证）</text>
  <text x="295" y="158" font-size="9" fill="#4a5568">• ISG 面板（siRNA-07）</text>
  <text x="295" y="176" font-size="9" fill="#4a5568">• 全基因组 off-target 预测 +</text>
  <text x="295" y="190" font-size="9" fill="#4a5568">  代表性 RNA-seq（n≥3）</text>
  <text x="295" y="214" font-size="9" fill="#718096">输出：EC50 式浓度–效应曲线</text>
  <text x="295" y="248" font-size="8" fill="#276749" font-weight="600">共识：选多条均有效且</text>
  <text x="295" y="264" font-size="8" fill="#276749">ISG 最低的序列进入体内</text>
  <rect x="530" y="60" width="220" height="250" fill="#fff" stroke="#d6bcfa" stroke-width="2" rx="6"/>
  <text x="640" y="82" text-anchor="middle" font-size="12" fill="#6b46c1" font-weight="600">寡核苷酸药物 / IND</text>
  <text x="545" y="104" font-size="9" fill="#4a5568">• 靶组织 mRNA PD（qPCR/</text>
  <text x="545" y="118" font-size="9" fill="#4a5568">  branched DNA / 组织 RNA-seq）</text>
  <text x="545" y="140" font-size="9" fill="#4a5568">• 下游蛋白/通路 biomarker</text>
  <text x="545" y="158" font-size="9" fill="#4a5568">• 种属交叉验证（人/鼠同源）</text>
  <text x="545" y="176" font-size="9" fill="#4a5568">• GLP 级重复与 QC（MIQE 等）</text>
  <text x="545" y="194" font-size="9" fill="#4a5568">• 安全：细胞因子、肝酶、</text>
  <text x="545" y="208" font-size="9" fill="#4a5568">  补体、血小板（依载体）</text>
  <text x="545" y="232" font-size="9" fill="#718096">临床：组织活检或体液标志物</text>
  <text x="545" y="248" font-size="8" fill="#6b46c1" font-weight="600">共识：PD 与剂量–效应相关</text>
  <text x="545" y="264" font-size="8" fill="#718096">而非单一体外 % 阈值</text>
</svg>