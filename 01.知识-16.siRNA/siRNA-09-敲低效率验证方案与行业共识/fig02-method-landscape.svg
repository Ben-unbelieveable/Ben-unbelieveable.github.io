<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" font-family="Segoe UI, 'Microsoft YaHei', sans-serif">
  <rect width="800" height="380" fill="#fafafa"/>
