<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 440" font-family="Segoe UI, 'Microsoft YaHei', sans-serif">
  <rect width="720" height="440" fill="#fafafa"/>
  <text x="360" y="28" text-anchor="middle" font-size="15" fill="#1a202c" font-weight="600">图 1　siRNA 敲低验证的证据层级（由机制到表型）</text>
  <text x="360" y="46" text-anchor="middle" font-size="10" fill="#718096">底层为 on-target 分子读出；上层为特异性与功能因果；箭头示推荐叠加顺序</text>
  <!-- pyramid layers bottom to top -->
  <polygon points="360,380 120,300 600,300" fill="#bee3f8" stroke="#2b6cb0" stroke-width="1.5"/>
  <text x="360" y="328" text-anchor="middle" font-size="11" fill="#1a365d" font-weight="600">L1  靶向 mRNA 定量（qPCR / branched DNA）</text>
  <text x="360" y="344" text-anchor="middle" font-size="9" fill="#2d3748">行业最低共识；须 NTC 对照 + 引物跨切割位点</text>
  <polygon points="360,300 160,230 560,230" fill="#9ae6b4" stroke="#276749" stroke-width="1.5"/>
  <text x="360" y="258" text-anchor="middle" font-size="11" fill="#22543d" font-weight="600">L2  蛋白/细胞水平（Western / 流式 / ELISA / IF）</text>
  <text x="360" y="274" text-anchor="middle" font-size="9" fill="#2d3748">反映功能蛋白；受半衰期与翻译调控影响</text>
  <polygon points="360,230 200,165 520,165" fill="#fbd38d" stroke="#c05621" stroke-width="1.5"/>
  <text x="360" y="193" text-anchor="middle" font-size="11" fill="#744210" font-weight="600">L3  正交与机制（≥2 条独立 siRNA / 荧光素酶 / 5' RACE）</text>
  <text x="360" y="209" text-anchor="middle" font-size="9" fill="#2d3748">排除单序列脱靶；Reporter 验证位点可及性</text>
  <polygon points="360,165 240,105 480,105" fill="#feb2b2" stroke="#c53030" stroke-width="1.5"/>
  <text x="360" y="128" text-anchor="middle" font-size="11" fill="#742a2a" font-weight="600">L4  转录组脱靶（RNA-seq / Nanostring）</text>
  <text x="360" y="144" text-anchor="middle" font-size="9" fill="#2d3748">高 stakes 项目；FDR 控制 + 生物学重复</text>
  <polygon points="360,105 280,55 440,55" fill="#d6bcfa" stroke="#6b46c1" stroke-width="1.5"/>
  <text x="360" y="78" text-anchor="middle" font-size="10" fill="#44337a" font-weight="600">L5  功能因果（rescue / 表型 + 多序列一致）</text>
  <rect x="40" y="390" width="640" height="42" fill="#fff" stroke="#e2e8f0" rx="4"/>
  <text x="55" y="408" font-size="9" fill="#4a5568">基础研究：L1 + L2 + L3（≥2 siRNA）为常见投稿底线；药物研发：L1–L4 + 组织 PD 生物标志物 + 免疫面板（siRNA-07）</text>
  <text x="55" y="424" font-size="9" fill="#718096">「效率」通常指 L1/L2 相对 NTC 的降幅；不等同于 L5 的功能验证</text>
</svg>